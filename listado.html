<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--blue:#2233cc;--blue-dark:#1628b0;--orange:#e85d20;--bg:#eef0f8;--card:#fff;--text:#111827;--muted:#6b7280;--border:#d9deea;--red:#dc2626;--soft:#f8f9ff}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:95px}.header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,var(--blue),var(--blue-dark));padding:12px 14px;box-shadow:0 5px 20px rgba(0,0,0,.15)}.top-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:10px}.logo{color:#fff;font-size:20px;font-weight:900;letter-spacing:-.5px;white-space:nowrap}.logo span{color:var(--orange)}.header-tabs{flex:1;display:flex;align-items:center;gap:6px;overflow-x:auto;scrollbar-width:none}.header-tabs::-webkit-scrollbar{display:none}.page{max-width:620px;margin:0 auto}.listado-head{position:sticky;top:64px;z-index:35;background:var(--bg);padding:12px 14px 10px;border-bottom:1px solid rgba(217,222,234,.65)}.title-row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}.page-title{font-size:18px;font-weight:900}.page-subtitle{font-size:11px;color:var(--muted);font-weight:800;margin-top:2px}.admin-btn{border:none;background:var(--blue);color:#fff;border-radius:999px;padding:9px 13px;font-size:11px;font-weight:900;cursor:pointer;white-space:nowrap}.search-wrap{position:relative}.search{width:100%;border:2px solid transparent;border-radius:14px;padding:14px 42px;font-size:16px;font-weight:800;outline:none;background:#fff;box-shadow:0 3px 14px rgba(0,0,0,.06)}.search:focus{border-color:var(--orange)}.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}.clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);border:none;background:#eef0f8;width:28px;height:28px;border-radius:50%;font-weight:900;display:none;cursor:pointer}.clear.show{display:block}.admin-panel{display:none;background:#fff;margin:14px;border-radius:16px;padding:14px;box-shadow:0 3px 14px rgba(0,0,0,.08)}.admin-panel.show{display:block}.form-title{font-size:16px;font-weight:900;margin-bottom:12px}.form-grid{display:grid;gap:10px}label{display:block;font-size:10px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}input,select,textarea{width:100%;border:1px solid var(--border);border-radius:10px;padding:11px;font-family:'Inter';font-size:14px;font-weight:700;outline:none;background:#fff}textarea{min-height:70px;resize:vertical}.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.check-row{display:flex;align-items:center;gap:8px;margin-top:5px;font-size:13px;font-weight:800}.check-row input{width:auto}.actions{display:flex;gap:8px;margin-top:10px}.btn{flex:1;border:none;border-radius:11px;padding:12px;font-size:12px;font-weight:900;cursor:pointer}.btn-save{background:var(--blue);color:#fff}.btn-clear{background:#e5e7eb;color:#111827}.btn-danger{background:var(--red);color:#fff}.extra-admin{background:var(--soft);border:1px solid var(--border);border-radius:12px;padding:10px;margin-top:4px}.extra-admin-title{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}.extra-admin-title strong{font-size:12px;font-weight:900}.extra-admin-title small{color:var(--muted);font-size:10px;font-weight:800}.extra-admin-row{display:flex;justify-content:space-between;gap:8px;align-items:center;background:#fff;border:1px solid var(--border);border-radius:9px;padding:8px;margin-top:6px}.extra-admin-row div{font-size:12px;font-weight:800;line-height:1.35}.extra-admin-row small{display:block;color:var(--muted);margin-top:2px}.extra-admin-row button{border:none;background:var(--red);color:#fff;border-radius:8px;padding:7px 9px;font-weight:900}.results{padding:14px}.category-block{margin-bottom:18px}.category-title{display:flex;align-items:center;gap:8px;margin:8px 0 10px}.category-title b{font-size:12px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}.category-title span{background:var(--orange);color:#fff;border-radius:999px;padding:3px 8px;font-size:10px;font-weight:900}.category-title .line{flex:1;height:1px;background:var(--border)}.item{background:#fff;border-radius:15px;margin-bottom:9px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06)}.item-head{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer}.item.expanded .item-head{background:var(--blue);color:#fff}.item-info{flex:1;min-width:0}.item-name{font-size:14px;font-weight:900;line-height:1.25}.item-cat{font-size:11px;color:var(--muted);margin-top:3px;font-weight:700}.item.expanded .item-cat{color:rgba(255,255,255,.65)}.item-minimo{margin-top:4px;font-size:11px;font-weight:900;color:var(--orange)}.item.expanded .item-minimo{color:#ffb18d}.price-box{text-align:right;flex-shrink:0}.price{color:var(--blue);font-size:21px;font-weight:900;line-height:1}.item.expanded .price{color:#fff}.unit{font-size:9px;color:var(--muted);font-weight:800;text-transform:uppercase;margin-top:3px}.item.expanded .unit{color:rgba(255,255,255,.65)}.chev{color:var(--muted);font-size:14px;transition:.2s}.item.expanded .chev{color:rgba(255,255,255,.65);transform:rotate(180deg)}.detail{display:none;padding:14px}.item.expanded .detail{display:block}.note{background:var(--soft);border:1px solid var(--border);border-radius:10px;padding:10px;font-size:12px;line-height:1.45;color:#475569;font-weight:600;margin-bottom:10px}.extra-list{margin:10px 0}.extra-title{font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:7px}.extra-card{background:#f3f4f8;border:1px solid var(--border);border-radius:10px;padding:9px 10px;margin-bottom:6px;display:flex;justify-content:space-between;gap:8px}.extra-card b{font-size:12px}.extra-card small{display:block;color:var(--muted);font-weight:700;margin-top:2px}.extra-price{font-size:13px;font-weight:900;color:var(--orange);white-space:nowrap}.copy-btn{width:100%;border:none;background:var(--blue);color:#fff;border-radius:12px;padding:12px;font-weight:900;font-size:13px;cursor:pointer}.empty{text-align:center;padding:40px 20px;color:var(--muted);font-weight:800}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(80px);background:#111827;color:#fff;padding:12px 18px;border-radius:999px;font-size:13px;font-weight:900;opacity:0;transition:.22s;z-index:300;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@media(max-width:760px){.top-inner{align-items:flex-start;flex-wrap:wrap}.logo{padding-top:6px}.header-tabs{width:100%;flex-basis:100%}.listado-head{top:58px}}@media(max-width:390px){.row2{grid-template-columns:1fr}.page-title{font-size:16px}.price{font-size:18px}}
</style>
</head>
<body>
<header class="header"><div class="top-inner"><div class="logo">TUTTO<span>▲</span></div><nav id="authMenu" class="header-tabs"></nav></div></header>
<div class="page">
<section class="listado-head"><div class="title-row"><div><div class="page-title">Listado de precios</div><div class="page-subtitle">Productos organizados por categoría</div></div><button class="admin-btn" onclick="toggleAdmin()">⚙️ Administrar</button></div><div class="search-wrap"><span class="search-icon">🔎</span><input id="search" class="search" placeholder="Buscar vinil, lona, barniz..." autocomplete="off"><button id="clearBtn" class="clear" onclick="clearSearch()">×</button></div></section>
<section class="admin-panel" id="adminPanel"><div class="form-title" id="formTitle">Agregar producto</div><div class="form-grid"><div><label>Nombre del producto</label><input id="fNombre" placeholder="Ej: Vinil holográfico con barniz"></div><div><label>Categoría</label><input id="fCategoria" placeholder="Ej: Vinil adhesivo"></div><div class="row2"><div><label>Precio</label><input id="fPrecio" type="number" step="0.01" placeholder="Ej: 23"></div><div><label>Unidad</label><select id="fUnidad"><option value="m²">m²</option><option value="unidad">unidad</option><option value="pliego">pliego</option><option value="metro lineal">metro lineal</option><option value="servicio">servicio</option></select></div></div><div class="row2"><div><label>Cantidad mínima</label><input id="fMinimo" type="number" step="0.01" placeholder="Ej: 1"></div><div><label>Tipo mínimo</label><select id="fTipoMinimo"><option value="m²">m²</option><option value="unidad">unidad</option><option value="pliego">pliego</option><option value="metro lineal">metro lineal</option><option value="servicio">servicio</option></select></div></div><div><label>Palabras clave</label><input id="fKeywords" placeholder="vinil sticker etiqueta barniz"></div><div><label>Nota</label><textarea id="fNota" placeholder="Ej: Incluye impresión UV + barniz."></textarea></div><div class="extra-admin"><div class="extra-admin-title"><strong>Extras / adicionales del producto</strong><small>Opcional</small></div><div class="row2"><input id="exNombre" placeholder="Extra: Troquel"><input id="exPrecio" type="number" step="0.01" placeholder="Precio"></div><div class="row2" style="margin-top:8px"><select id="exUnidad"><option value="m²">m²</option><option value="unidad">unidad</option><option value="pliego">pliego</option><option value="metro lineal">metro lineal</option><option value="servicio">servicio</option></select><input id="exNota" placeholder="Nota del extra"></div><button class="btn btn-clear" style="margin-top:8px;width:100%" onclick="addExtra()">+ Añadir extra al producto</button><div id="extrasAdminList"></div></div><label class="check-row"><input type="checkbox" id="fActivo" checked> Activo / visible</label></div><div class="actions"><button class="btn btn-save" onclick="saveItem()">Guardar</button><button class="btn btn-clear" onclick="resetForm()">Limpiar</button><button class="btn btn-danger" onclick="deleteEditingItem()">Eliminar</button></div></section>
<main class="results" id="results"></main></div><div class="toast" id="toast">Guardado</div>
<script src="js/menu.js?v=12"></script>
<script>
const STORAGE_KEY='tutto_listado_items_v3';let editingId=null,expandedId=null,query='',tempExtras=[];const defaultItems=[{id:'vinil-blanco-sb',nombre:'Vinil blanco sin barniz',categoria:'Vinil adhesivo',precio:15,unidad:'m²',cantidadMinima:1,tipoMinimo:'m²',nota:'Precio base por metro cuadrado.',keywords:'vinil blanco sticker etiqueta sin barniz',activo:true,extras:[{nombre:'Troquel / Die-cut',precio:5,unidad:'m²',nota:'Corte por forma'}]},{id:'vinil-blanco-cb',nombre:'Vinil blanco con barniz',categoria:'Vinil adhesivo',precio:20,unidad:'m²',cantidadMinima:1,tipoMinimo:'m²',nota:'Incluye impresión UV + barniz.',keywords:'vinil blanco sticker etiqueta barniz',activo:true,extras:[{nombre:'Troquel / Die-cut',precio:5,unidad:'m²',nota:'Corte por forma'}]},{id:'holografico-sb',nombre:'Vinil holográfico sin barniz',categoria:'Vinil adhesivo',precio:18,unidad:'m²',cantidadMinima:1,tipoMinimo:'m²',nota:'Material premium holográfico.',keywords:'holografico holo sticker etiqueta',activo:true,extras:[{nombre:'Troquel / Die-cut',precio:5,unidad:'m²',nota:'Corte por forma'}]},{id:'holografico-cb',nombre:'Vinil holográfico con barniz',categoria:'Vinil adhesivo',precio:23,unidad:'m²',cantidadMinima:1,tipoMinimo:'m²',nota:'Ideal para stickers premium.',keywords:'holografico holo sticker etiqueta barniz',activo:true,extras:[{nombre:'Troquel / Die-cut',precio:5,unidad:'m²',nota:'Corte por forma'}]},{id:'lona-impresa',nombre:'Lona impresa',categoria:'Lona / Banner',precio:15,unidad:'m²',cantidadMinima:1,tipoMinimo:'m²',nota:'Precio por metro cuadrado.',keywords:'lona banner pendon pancarta',activo:true,extras:[{nombre:'Ojales metálicos',precio:5,unidad:'unidad',nota:'Precio por ojal'}]},{id:'sulfato-pliego',nombre:'Pliego sulfato 70×100',categoria:'Sulfato',precio:14,unidad:'pliego',cantidadMinima:1,tipoMinimo:'pliego',nota:'Área imprimible aproximada 68×80 cm.',keywords:'sulfato pliego caja packaging',activo:true,extras:[{nombre:'Doble cara',precio:14,unidad:'pliego',nota:'Impresión por la segunda cara'}]}];let items=loadItems();function loadItems(){try{const s=localStorage.getItem(STORAGE_KEY);if(s)return JSON.parse(s)}catch(e){console.warn('No se pudo leer listado:',e)}return defaultItems}function saveStorage(){localStorage.setItem(STORAGE_KEY,JSON.stringify(items))}function normalize(t){return String(t||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim()}function filteredItems(){return items.filter(item=>{if(item.activo===false)return false;if(!query)return true;const extrasText=(item.extras||[]).map(ex=>`${ex.nombre} ${ex.nota}`).join(' ');const haystack=normalize(`${item.nombre} ${item.categoria} ${item.keywords} ${item.nota} ${extrasText}`);return query.split(/\s+/).filter(Boolean).every(t=>haystack.includes(normalize(t)))})}function groupByCategory(list){const groups={};list.forEach(item=>{const cat=item.categoria||'Sin categoría';if(!groups[cat])groups[cat]=[];groups[cat].push(item)});return Object.keys(groups).sort((a,b)=>a.localeCompare(b,'es')).map(cat=>({categoria:cat,items:groups[cat].sort((a,b)=>String(a.nombre).localeCompare(String(b.nombre),'es'))}))}function render(){renderResults()}function renderResults(){const box=document.getElementById('results'),list=filteredItems();if(!list.length){box.innerHTML='<div class="empty">No hay resultados</div>';return}box.innerHTML=groupByCategory(list).map(g=>`<section class="category-block"><div class="category-title"><b>${escapeHTML(g.categoria)}</b><span>${g.items.length}</span><div class="line"></div></div>${g.items.map(renderItemCard).join('')}</section>`).join('')}function renderItemCard(item){return `<div class="item ${expandedId===item.id?'expanded':''}"><div class="item-head" onclick="toggleItem('${item.id}')"><div class="item-info"><div class="item-name">${escapeHTML(item.nombre)}</div><div class="item-cat">${escapeHTML(item.categoria||'Sin categoría')}</div>${item.cantidadMinima?`<div class="item-minimo">Mínimo: ${item.cantidadMinima} ${escapeHTML(item.tipoMinimo||item.unidad)}</div>`:''}</div><div class="price-box"><div class="price">$${Number(item.precio||0).toFixed(2)}</div><div class="unit">/${escapeHTML(item.unidad||'')}</div></div><div class="chev">▾</div></div><div class="detail">${item.nota?`<div class="note">${escapeHTML(item.nota)}</div>`:''}${(item.extras&&item.extras.length)?`<div class="extra-list"><div class="extra-title">Adicionales</div>${item.extras.map(ex=>`<div class="extra-card"><div><b>${escapeHTML(ex.nombre)}</b>${ex.nota?`<small>${escapeHTML(ex.nota)}</small>`:''}</div><div class="extra-price">+$${Number(ex.precio||0).toFixed(2)} / ${escapeHTML(ex.unidad||'')}</div></div>`).join('')}</div>`:`<div class="note">Este producto no tiene extras configurados.</div>`}<button class="copy-btn" onclick="copyItem('${item.id}')">📋 Copiar para WhatsApp</button><div class="actions" style="margin-top:10px"><button class="btn btn-clear" onclick="editItem('${item.id}')">Editar</button></div></div></div>`}function toggleItem(id){expandedId=expandedId===id?null:id;renderResults()}function toggleAdmin(){document.getElementById('adminPanel').classList.toggle('show')}function addExtra(){const nombre=document.getElementById('exNombre').value.trim(),precio=parseFloat(document.getElementById('exPrecio').value)||0,unidad=document.getElementById('exUnidad').value,nota=document.getElementById('exNota').value.trim();if(!nombre){alert('Coloca el nombre del extra.');return}tempExtras.push({nombre,precio,unidad,nota});document.getElementById('exNombre').value='';document.getElementById('exPrecio').value='';document.getElementById('exNota').value='';renderExtrasAdmin()}function renderExtrasAdmin(){const box=document.getElementById('extrasAdminList');if(!tempExtras.length){box.innerHTML='<div class="note" style="margin-top:8px;margin-bottom:0">Este producto todavía no tiene extras.</div>';return}box.innerHTML=tempExtras.map((ex,i)=>`<div class="extra-admin-row"><div>${escapeHTML(ex.nombre)} · $${Number(ex.precio||0).toFixed(2)} / ${escapeHTML(ex.unidad)}${ex.nota?`<small>${escapeHTML(ex.nota)}</small>`:''}</div><button type="button" onclick="removeExtra(${i})">×</button></div>`).join('')}function removeExtra(i){tempExtras.splice(i,1);renderExtrasAdmin()}function saveItem(){const item={id:editingId||'item-'+Date.now(),nombre:document.getElementById('fNombre').value.trim(),categoria:document.getElementById('fCategoria').value.trim(),precio:parseFloat(document.getElementById('fPrecio').value)||0,unidad:document.getElementById('fUnidad').value,cantidadMinima:parseFloat(document.getElementById('fMinimo').value)||0,tipoMinimo:document.getElementById('fTipoMinimo').value,keywords:document.getElementById('fKeywords').value.trim(),nota:document.getElementById('fNota').value.trim(),activo:document.getElementById('fActivo').checked,extras:[...tempExtras]};if(!item.nombre){alert('Coloca el nombre del producto.');return}if(!item.categoria){alert('Coloca una categoría.');return}if(editingId){items=items.map(i=>i.id===editingId?item:i)}else{items.push(item)}saveStorage();resetForm();render();showToast('Producto guardado')}function editItem(id){const item=items.find(i=>i.id===id);if(!item)return;editingId=id;tempExtras=[...(item.extras||[])];document.getElementById('formTitle').textContent='Editando producto';document.getElementById('adminPanel').classList.add('show');document.getElementById('fNombre').value=item.nombre||'';document.getElementById('fCategoria').value=item.categoria||'';document.getElementById('fPrecio').value=item.precio||'';document.getElementById('fUnidad').value=item.unidad||'m²';document.getElementById('fMinimo').value=item.cantidadMinima||'';document.getElementById('fTipoMinimo').value=item.tipoMinimo||item.unidad||'m²';document.getElementById('fKeywords').value=item.keywords||'';document.getElementById('fNota').value=item.nota||'';document.getElementById('fActivo').checked=item.activo!==false;renderExtrasAdmin();window.scrollTo({top:0,behavior:'smooth'})}function resetForm(){editingId=null;tempExtras=[];document.getElementById('formTitle').textContent='Agregar producto';['fNombre','fCategoria','fPrecio','fMinimo','fKeywords','fNota','exNombre','exPrecio','exNota'].forEach(id=>{document.getElementById(id).value=''});document.getElementById('fUnidad').value='m²';document.getElementById('fTipoMinimo').value='m²';document.getElementById('exUnidad').value='m²';document.getElementById('fActivo').checked=true;renderExtrasAdmin()}function deleteEditingItem(){if(!editingId){alert('Primero selecciona un producto para editar.');return}const item=items.find(i=>i.id===editingId),nombre=item?item.nombre:'este producto';if(!confirm(`¿Seguro que deseas eliminar "${nombre}"?`))return;items=items.filter(i=>i.id!==editingId);saveStorage();resetForm();render();showToast('Producto eliminado')}function copyItem(id){const item=items.find(i=>i.id===id);if(!item)return;let extrasText='';if(item.extras&&item.extras.length){extrasText='\nAdicionales:\n'+item.extras.map(ex=>`+ ${ex.nombre}: $${Number(ex.precio||0).toFixed(2)} / ${ex.unidad}`).join('\n')}const text=`${item.nombre}\nCategoría: ${item.categoria}\nPrecio: $${Number(item.precio||0).toFixed(2)} / ${item.unidad}\n${item.cantidadMinima?`Mínimo: ${item.cantidadMinima} ${item.tipoMinimo||item.unidad}`:''}\n${item.nota?`Nota: ${item.nota}`:''}${extrasText}`;copyText(text);showToast('Copiado para WhatsApp')}function copyText(text){if(navigator.clipboard){navigator.clipboard.writeText(text);return}const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove()}function clearSearch(){document.getElementById('search').value='';query='';document.getElementById('clearBtn').classList.remove('show');render()}function showToast(msg){const toast=document.getElementById('toast');toast.textContent=msg;toast.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>toast.classList.remove('show'),1600)}function escapeHTML(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}document.getElementById('search').addEventListener('input',e=>{query=normalize(e.target.value);document.getElementById('clearBtn').classList.toggle('show',!!query);render()});render();renderExtrasAdmin();
</script>
</body>
</html>
