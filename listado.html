<!DOCTYPE html>
<html lang="es" class="loading-menu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Listado · Tuttovinilos</title>

<link rel="stylesheet" href="css/menu.css?v=34">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800;900&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2233cc;
  --blue-dark:#1628b0;
  --orange:#e85d20;
  --bg:#eef0f8;
  --card:#fff;
  --text:#111827;
  --muted:#6b7280;
  --border:#d9deea;
  --red:#dc2626;
  --green:#16a34a;
  --soft:#f8f9ff;
}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding-bottom:95px;
}
.header{
  position:sticky;
  top:0;
  z-index:50;
  background:linear-gradient(135deg,var(--blue),var(--blue-dark));
  padding:12px 14px;
  box-shadow:0 5px 20px rgba(0,0,0,.15);
}
.top-inner{
  max-width:1180px;
  margin:0 auto;
  display:flex;
  align-items:center;
  gap:10px;
}
.logo{
  color:#fff;
  font-size:20px;
  font-weight:900;
  letter-spacing:-.5px;
  white-space:nowrap;
}
.logo span{color:var(--orange)}
.header-tabs{
  flex:1;
  display:flex;
  align-items:center;
  gap:6px;
  overflow-x:auto;
  scrollbar-width:none;
}
.header-tabs::-webkit-scrollbar{display:none}
.page{max-width:620px;margin:0 auto}
.listado-head{
  position:sticky;
  top:64px;
  z-index:35;
  background:var(--bg);
  padding:12px 14px 10px;
  border-bottom:1px solid rgba(217,222,234,.65);
}
.title-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}
.page-title{font-size:18px;font-weight:900}
.page-subtitle{font-size:11px;color:var(--muted);font-weight:800;margin-top:2px}
.view-actions{display:flex;gap:7px;align-items:center;flex-shrink:0}
.view-btn{
  border:none;
  background:#fff;
  color:var(--blue);
  border-radius:999px;
  padding:9px 12px;
  font-size:11px;
  font-weight:900;
  cursor:pointer;
  white-space:nowrap;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}
.view-btn.active{background:var(--blue);color:#fff}
.view-btn.admin{background:var(--orange);color:#fff}
.view-btn.admin.active{background:var(--blue);color:#fff}
.search-wrap{position:relative}
.search{
  width:100%;
  border:2px solid transparent;
  border-radius:14px;
  padding:14px 42px;
  font-size:16px;
  font-weight:800;
  outline:none;
  background:#fff;
  box-shadow:0 3px 14px rgba(0,0,0,.06);
}
.search:focus{border-color:var(--orange)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
.clear{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  border:none;
  background:#eef0f8;
  width:28px;
  height:28px;
  border-radius:50%;
  font-weight:900;
  display:none;
  cursor:pointer;
}
.clear.show{display:block}
.admin-panel{
  display:none;
  background:#fff;
  margin:14px;
  border-radius:16px;
  padding:14px;
  box-shadow:0 3px 14px rgba(0,0,0,.08);
}
.admin-panel.show{display:block}
.form-title{font-size:16px;font-weight:900;margin-bottom:12px}
.form-grid{display:grid;gap:10px}
label{
  display:block;
  font-size:10px;
  color:var(--muted);
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:5px;
}
input,select,textarea{
  width:100%;
  border:1px solid var(--border);
  border-radius:10px;
  padding:11px;
  font-family:'Inter';
  font-size:14px;
  font-weight:700;
  outline:none;
  background:#fff;
}
textarea{min-height:72px;resize:vertical}
.form-help{display:block;margin-top:5px;color:var(--muted);font-size:10px;font-weight:800;line-height:1.35}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.check-row{display:flex;align-items:center;gap:8px;margin-top:5px;font-size:13px;font-weight:800}
.check-row input{width:auto}
.actions{display:flex;gap:8px;margin-top:10px}
.btn{
  flex:1;
  border:none;
  border-radius:11px;
  padding:12px;
  font-size:12px;
  font-weight:900;
  cursor:pointer;
}
.btn-save{background:var(--blue);color:#fff}
.btn-clear{background:#e5e7eb;color:#111827}
.btn-danger{background:var(--red);color:#fff}
.btn-sync{background:var(--green);color:#fff}
.extra-admin{
  background:var(--soft);
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
  margin-top:4px;
}
.extra-admin-title{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
.extra-admin-title strong{font-size:12px;font-weight:900}
.extra-admin-title small{color:var(--muted);font-size:10px;font-weight:800}
.extra-admin-row{
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:center;
  background:#fff;
  border:1px solid var(--border);
  border-radius:9px;
  padding:8px;
  margin-top:6px;
}
.extra-admin-row div{font-size:12px;font-weight:800;line-height:1.35}
.extra-admin-row small{display:block;color:var(--muted);margin-top:2px}
.extra-admin-row button{border:none;background:var(--red);color:#fff;border-radius:8px;padding:7px 9px;font-weight:900}
.results{padding:14px}
.category-block{margin-bottom:10px}
.category-title{
  display:flex;
  align-items:center;
  gap:10px;
  margin:8px 0 8px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:14px;
  padding:13px 14px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
  cursor:pointer;
  user-select:none;
}
.category-title b{
  font-size:13px;
  font-weight:900;
  color:var(--text);
  text-transform:uppercase;
  letter-spacing:1.2px;
  flex:1;
}
.category-title span{background:var(--orange);color:#fff;border-radius:999px;padding:4px 8px;font-size:10px;font-weight:900}
.cat-chevron{font-size:14px;color:var(--muted);transition:.18s}
.category-block.open .cat-chevron{transform:rotate(180deg);color:var(--blue)}
.category-content{display:none}
.category-block.open .category-content{display:block;animation:catShow .16s ease}
@keyframes catShow{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.item{
  background:#fff;
  border-radius:15px;
  margin-bottom:9px;
  overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
}
.item-head{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer}
.item.expanded .item-head{background:var(--blue);color:#fff}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:900;line-height:1.25}
.item-cat{font-size:11px;color:var(--muted);margin-top:3px;font-weight:700}
.item.expanded .item-cat{color:rgba(255,255,255,.65)}
.item-preview{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.mini-pill{display:inline-flex;align-items:center;gap:4px;background:#f3f4f8;border:1px solid var(--border);color:#475569;border-radius:999px;padding:4px 7px;font-size:10px;font-weight:900;line-height:1}
.mini-pill.orange{background:rgba(232,93,32,.10);border-color:rgba(232,93,32,.25);color:var(--orange)}
.mini-extras,.mini-notes{margin-top:6px;display:grid;gap:3px}
.mini-extra-line,.mini-note-line{font-size:11px;font-weight:800;color:#475569;line-height:1.25;white-space:normal;overflow:hidden;text-overflow:ellipsis}
.mini-extra-line:before{content:'Extra: ';font-weight:900;color:var(--muted)}
.mini-note-line{font-weight:700;color:#64748b}
.mini-note-line:before{content:'Nota: ';font-weight:900;color:var(--muted)}
.item.expanded .mini-pill{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.24);color:#fff}
.item.expanded .mini-pill.orange{color:#ffb18d}
.item.expanded .mini-extra-line,.item.expanded .mini-note-line{color:rgba(255,255,255,.74)}
.item.expanded .mini-extra-line:before,.item.expanded .mini-note-line:before{color:rgba(255,255,255,.55)}
.price-box{text-align:right;flex-shrink:0}
.price{color:var(--blue);font-size:21px;font-weight:900;line-height:1}
.item.expanded .price{color:#fff}
.unit{font-size:9px;color:var(--muted);font-weight:800;text-transform:uppercase;margin-top:3px}
.item.expanded .unit{color:rgba(255,255,255,.65)}
.chev{color:var(--muted);font-size:14px;transition:.2s}
.item.expanded .chev{color:rgba(255,255,255,.65);transform:rotate(180deg)}
.detail{display:none;padding:14px}
.item.expanded .detail{display:block}
.note{
  background:var(--soft);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
  font-size:12px;
  line-height:1.45;
  color:#475569;
  font-weight:600;
  margin-bottom:10px;
}
.extra-list{margin:10px 0}
.extra-title{font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:7px}
.extra-card{
  background:#f3f4f8;
  border:1px solid var(--border);
  border-radius:10px;
  padding:9px 10px;
  margin-bottom:6px;
  display:flex;
  justify-content:space-between;
  gap:8px;
}
.extra-card b{font-size:12px}
.extra-card small{display:block;color:var(--muted);font-weight:700;margin-top:2px}
.extra-price{font-size:13px;font-weight:900;color:var(--orange);white-space:nowrap}
.copy-btn{width:100%;border:none;background:var(--blue);color:#fff;border-radius:12px;padding:12px;font-weight:900;font-size:13px;cursor:pointer}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-weight:800;background:#fff;border-radius:14px;border:1px solid var(--border)}
.status-box{margin:14px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px;font-size:12px;font-weight:800;color:var(--muted)}
.status-box.ok{color:var(--green)}
.status-box.err{color:var(--red)}
.toast{
  position:fixed;
  left:50%;
  bottom:22px;
  transform:translateX(-50%) translateY(80px);
  background:#111827;
  color:#fff;
  padding:12px 18px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
  opacity:0;
  transition:.22s;
  z-index:300;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:760px){
  .top-inner{align-items:flex-start;flex-wrap:wrap}
  .logo{padding-top:6px}
  .header-tabs{width:100%;flex-basis:100%}
  .listado-head{top:58px}
}
@media(max-width:390px){.row2{grid-template-columns:1fr}.page-title{font-size:16px}.price{font-size:18px}}

/* =========================================================
   HEADER COMANDA · MISMO MENÚ GLOBAL
   Esta página usa la misma estructura que index.html:
   .header > .logo + #authMenu
========================================================= */
:root{
  --accent:#153bff;
  --accent2:#0b1f7a;
  --border2:#cbd3e6;
  --head:'Montserrat',Arial,sans-serif;
  --body:'Inter',Arial,sans-serif;
  --mono:'Roboto Mono',monospace;
  --listado-head-top:64px;
}

html.loading-menu .header-tabs{
  opacity:0!important;
  visibility:hidden!important;
}

html.menu-ready .header-tabs,
.header.menu-ready .header-tabs{
  opacity:1!important;
  visibility:visible!important;
}

.header{
  background:#172bd8!important;
  border-bottom:0!important;
  box-shadow:0 8px 20px rgba(21,59,255,.18)!important;
  min-height:64px!important;
  height:64px!important;
  overflow:hidden!important;
  position:sticky!important;
  top:0!important;
  z-index:300!important;
  padding:14px 14px!important;
  display:flex!important;
  align-items:center!important;
  gap:12px!important;
  flex-wrap:nowrap!important;
  transition:none!important;
  animation:none!important;
}

.header,
.header *,
.header-tabs,
.header-tabs *,
.tab-btn,
.storage-pill,
.mobile-menu-btn{
  transition:none!important;
  animation:none!important;
}

.header .logo{
  display:flex!important;
  align-items:center!important;
  gap:8px!important;
  flex:0 0 auto!important;
  width:auto!important;
  min-width:120px!important;
  color:#fff!important;
  border:0!important;
  padding:0!important;
  margin:0!important;
  letter-spacing:0!important;
  white-space:nowrap!important;
}

.header .logo img{
  display:block!important;
  height:32px!important;
  width:auto!important;
  max-width:128px!important;
  object-fit:contain!important;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));
}

.header .logo small{
  display:none!important;
  color:#fff!important;
  font-family:var(--head)!important;
  font-weight:900!important;
  font-size:11px!important;
  letter-spacing:1.4px!important;
}

.header-tabs{
  min-height:34px!important;
  display:flex!important;
  align-items:center!important;
  justify-content:flex-end!important;
  gap:7px!important;
  flex:1 1 auto!important;
  flex-wrap:nowrap!important;
  min-width:0!important;
  margin-left:auto!important;
  overflow:visible!important;
}

.header-tabs .tab-btn,
.header-tabs a.tab-btn,
.header-tabs button.tab-btn,
.header-tabs .storage-pill{
  height:31px!important;
  min-height:31px!important;
  padding:0 10px!important;
  border-radius:999px!important;
  border:1px solid rgba(255,255,255,.28)!important;
  background:rgba(255,255,255,.09)!important;
  color:#ffffff!important;
  font-family:var(--head)!important;
  font-size:9.8px!important;
  line-height:1!important;
  font-weight:900!important;
  letter-spacing:.38px!important;
  text-transform:uppercase!important;
  text-decoration:none!important;
  display:inline-flex!important;
  align-items:center!important;
  justify-content:center!important;
  gap:5px!important;
  white-space:nowrap!important;
  cursor:pointer!important;
}

.header-tabs .tab-btn:hover,
.header-tabs .storage-pill:hover{
  background:rgba(255,255,255,.16)!important;
  border-color:rgba(255,255,255,.45)!important;
  color:#fff!important;
}

.header-tabs .tab-btn.active{
  background:#ffffff!important;
  color:#153bff!important;
  border-color:#ffffff!important;
  box-shadow:0 8px 18px rgba(0,0,0,.12)!important;
}

.header-tabs .storage-pill{
  cursor:default!important;
  background:rgba(255,255,255,.12)!important;
}

.header-tabs .storage-pill .storage-dot{
  width:7px!important;
  height:7px!important;
  border-radius:50%!important;
  background:#22c55e!important;
  flex:0 0 auto!important;
}

.header-tabs .storage-pill span{
  color:#ffffff!important;
  font-family:var(--head)!important;
  font-size:9.8px!important;
  font-weight:900!important;
  letter-spacing:.38px!important;
  text-transform:uppercase!important;
}

.mobile-menu-btn{
  display:none!important;
  align-items:center!important;
  justify-content:center!important;
  margin-left:auto!important;
  color:#fff!important;
  background:rgba(255,255,255,.12)!important;
  border:1px solid rgba(255,255,255,.28)!important;
  border-radius:999px!important;
  min-height:34px!important;
  padding:8px 14px!important;
  font-family:var(--head)!important;
  font-size:12px!important;
  font-weight:900!important;
  letter-spacing:.6px!important;
  text-transform:uppercase!important;

}

.listado-head{

}

@media(max-width:1180px){

  .header .logo img{height:30px!important;max-width:118px!important;}
  .header .logo{min-width:100px!important;}
  .header-tabs{gap:4px!important;}
  .header-tabs .tab-btn,
  .header-tabs .storage-pill{
    padding:0 8px!important;
    font-size:9.2px!important;
    gap:4px!important;
    letter-spacing:.28px!important;
  }

  .header{
    height:auto!important;
    min-height:64px!important;
    overflow:visible!important;
    flex-wrap:wrap!important;
    justify-content:space-between!important;
  }

  .header .logo{
    min-width:120px!important;
  }

  .header .logo img{
    height:32px!important;
    max-width:128px!important;
  }

  .mobile-menu-btn{
    display:inline-flex!important;
  }

  .header.menu-ready .header-tabs{
    opacity:1!important;
    visibility:visible!important;
  }

  .header-tabs{
    display:none!important;
    width:100%!important;
    flex:1 1 100%!important;
    margin-left:0!important;
    padding-top:10px!important;
    border-top:1px solid rgba(255,255,255,.22)!important;
    grid-template-columns:1fr!important;
    gap:8px!important;
  }

  .header-tabs.open{
    display:grid!important;
  }

  .header-tabs .tab-btn,
  .header-tabs a.tab-btn,
  .header-tabs button.tab-btn,
  .header-tabs .storage-pill{
    width:100%!important;
    min-height:42px!important;
    height:42px!important;
    font-size:11px!important;
    justify-content:center!important;
  }

  .header-tabs .storage-pill span{
    font-size:11px!important;
  }
}

</style>
</head>

<body>
<header class="header">
  <div class="logo">
    <img src="Logo tutto1.svg" alt="Tutto Vinilos">
    <small>LISTADO</small>
  </div>

  <nav class="header-tabs" data-auth-menu id="authMenu"></nav>
</header>

<div class="page">
  <section class="listado-head">
    <div class="title-row">
      <div>
        <div class="page-title">Listado de precios</div>
        <div class="page-subtitle">Productos desde Supabase</div>
      </div>
      <div class="view-actions">
        <button id="btnPrecio" class="view-btn active" onclick="showPrecio()">💵 Precio</button>
        <button id="btnAdmin" class="view-btn admin" onclick="showAdmin()">⚙️ Administrador</button>
      </div>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔎</span>
      <input id="search" class="search" placeholder="Buscar vinil, lona, barniz..." autocomplete="off">
      <button id="clearBtn" class="clear" onclick="clearSearch()">×</button>
    </div>
  </section>

  <div id="statusBox" class="status-box">Conectando con Supabase...</div>

  <section class="admin-panel" id="adminPanel">
    <div class="form-title" id="formTitle">Agregar producto</div>

    <div class="form-grid">
      <div>
        <label>Nombre del producto</label>
        <input id="fNombre" placeholder="Ej: Vinil holográfico con barniz">
      </div>

      <div>
        <label>Categoría</label>
        <select id="fCategoriaSelect" onchange="onCategoriaSelectChange()">
          <option value="">Seleccionar categoría...</option>
          <option value="__nueva__">+ NUEVA CATEGORÍA</option>
        </select>
        <input id="fCategoria" list="categoriasList" placeholder="ESCRIBE NUEVA CATEGORÍA" style="display:none;margin-top:8px;text-transform:uppercase" oninput="forceUpperInput(this)">
        <datalist id="categoriasList"></datalist>
        <small class="form-help">Las categorías se guardan en MAYÚSCULAS para evitar duplicados por mayúsculas/minúsculas.</small>
      </div>

      <div class="row2">
        <div>
          <label>Precio</label>
          <input id="fPrecio" type="number" step="0.01" placeholder="Ej: 23">
        </div>
        <div>
          <label>Unidad</label>
          <select id="fUnidad">
            <option value="m²">m²</option>
            <option value="unidad">unidad</option>
            <option value="pliego">pliego</option>
            <option value="metro lineal">metro lineal</option>
            <option value="servicio">servicio</option>
          </select>
        </div>
      </div>

      <div class="row2">
        <div>
          <label>Cantidad mínima</label>
          <input id="fMinimo" type="number" step="0.01" placeholder="Ej: 1">
        </div>
        <div>
          <label>Tipo mínimo</label>
          <select id="fTipoMinimo">
            <option value="m²">m²</option>
            <option value="unidad">unidad</option>
            <option value="pliego">pliego</option>
            <option value="metro lineal">metro lineal</option>
            <option value="servicio">servicio</option>
          </select>
        </div>
      </div>

      <div>
        <label>Palabras clave</label>
        <input id="fKeywords" placeholder="vinil sticker etiqueta barniz">
      </div>

      <div>
        <label>Notas</label>
        <textarea id="fNota" placeholder="Puedes escribir varias notas, una por línea."></textarea>
      </div>

      <div class="extra-admin">
        <div class="extra-admin-title">
          <strong>Extras / adicionales del producto</strong>
          <small>Opcional</small>
        </div>

        <div class="row2">
          <input id="exNombre" placeholder="Extra: Troquel">
          <input id="exPrecio" type="number" step="0.01" placeholder="Precio">
        </div>

        <div class="row2" style="margin-top:8px">
          <select id="exUnidad">
            <option value="m²">m²</option>
            <option value="unidad">unidad</option>
            <option value="pliego">pliego</option>
            <option value="metro lineal">metro lineal</option>
            <option value="servicio">servicio</option>
          </select>
          <input id="exNota" placeholder="Nota del extra">
        </div>

        <button class="btn btn-clear" style="margin-top:8px;width:100%" onclick="addExtra()">+ Añadir extra al producto</button>
        <div id="extrasAdminList"></div>
      </div>

      <label class="check-row">
        <input type="checkbox" id="fActivo" checked>
        Activo / visible
      </label>
    </div>

    <div class="actions">
      <button class="btn btn-save" onclick="saveItem()">Guardar</button>
      <button class="btn btn-clear" onclick="resetForm()">Limpiar</button>
      <button class="btn btn-danger" onclick="deleteEditingItem()">Eliminar</button>
    </div>

    <div class="actions">
      <button class="btn btn-sync" onclick="loadFromSupabase()">Recargar Supabase</button>
    </div>
  </section>

  <main class="results" id="results"></main>
</div>

<div class="toast" id="toast">Guardado</div>

<script src="js/supabase.js?v=24"></script>
<script src="js/auth.js?v=24"></script>
<script src="js/menu.js?v=12"></script>

<script>
let editingId = null;
let expandedId = null;
let query = '';
let tempExtras = [];
let openCategories = {};
let items = [];
let categorias = [];
let isLoading = false;

function sb(){
  return window.supabaseClient || window.db || null;
}

function waitForSupabase(maxMs = 5000){
  return new Promise((resolve, reject) => {
    const start = Date.now();
    const timer = setInterval(() => {
      if(sb()){
        clearInterval(timer);
        resolve(sb());
        return;
      }
      if(Date.now() - start > maxMs){
        clearInterval(timer);
        reject(new Error('Supabase no cargó. Revisa js/supabase.js'));
      }
    }, 100);
  });
}

function normalize(text){
  return String(text || '')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/\s+/g,' ')
    .trim();
}

function toUpperClean(text){
  return String(text || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/\s+/g,' ')
    .trim()
    .toUpperCase();
}

function forceUpperInput(el){
  if(!el) return;
  const pos = el.selectionStart;
  el.value = toUpperClean(el.value);
  try{ el.setSelectionRange(pos, pos); }catch(e){}
}

function getCategoriaFormValue(){
  const select = document.getElementById('fCategoriaSelect');
  const input = document.getElementById('fCategoria');

  if(select && select.value && select.value !== '__nueva__'){
    return toUpperClean(select.value);
  }

  return toUpperClean(input ? input.value : '');
}

function onCategoriaSelectChange(){
  const select = document.getElementById('fCategoriaSelect');
  const input = document.getElementById('fCategoria');
  if(!select || !input) return;

  if(select.value === '__nueva__'){
    input.style.display = 'block';
    input.value = '';
    setTimeout(() => input.focus(), 30);
  }else{
    input.style.display = 'none';
    input.value = select.value ? toUpperClean(select.value) : '';
  }
}

function setCategoriaFormValue(nombre){
  const select = document.getElementById('fCategoriaSelect');
  const input = document.getElementById('fCategoria');
  const value = toUpperClean(nombre);

  if(!select || !input) return;

  const exists = Array.from(select.options).some(opt => opt.value === value);

  if(value && exists){
    select.value = value;
    input.style.display = 'none';
    input.value = value;
  }else if(value){
    select.value = '__nueva__';
    input.style.display = 'block';
    input.value = value;
  }else{
    select.value = '';
    input.style.display = 'none';
    input.value = '';
  }
}

function setStatus(msg, type){
  const box = document.getElementById('statusBox');
  if(!box) return;
  box.textContent = msg;
  box.className = 'status-box' + (type ? ' ' + type : '');
}

async function loadFromSupabase(){
  if(isLoading) return;
  isLoading = true;
  setStatus('Cargando productos desde Supabase...', '');

  try{
    const db = await waitForSupabase();

    const { data: cats, error: catError } = await db
      .from('listado_categorias')
      .select('id,nombre,nombre_key,activo,orden')
      .eq('activo', true)
      .order('orden', { ascending:true })
      .order('nombre', { ascending:true });

    if(catError) throw catError;
    categorias = cats || [];

    const { data, error } = await db
      .from('listado_productos')
      .select(`
        id,nombre,precio,unidad,cantidad_minima,tipo_minimo,keywords,nota,activo,orden,categoria_id,
        categoria:listado_categorias(id,nombre,nombre_key,orden),
        extras:listado_extras(id,nombre,precio,unidad,nota,activo,orden)
      `)
      .eq('activo', true)
      .order('orden', { ascending:true })
      .order('nombre', { ascending:true });

    if(error) throw error;

    items = (data || []).map(row => ({
      id: row.id,
      nombre: row.nombre || '',
      categoria_id: row.categoria_id,
      categoria: toUpperClean(row.categoria?.nombre || 'SIN CATEGORÍA'),
      precio: Number(row.precio || 0),
      unidad: row.unidad || 'm²',
      cantidadMinima: Number(row.cantidad_minima || 0),
      tipoMinimo: row.tipo_minimo || row.unidad || 'm²',
      keywords: row.keywords || '',
      nota: row.nota || '',
      activo: row.activo !== false,
      orden: Number(row.orden || 0),
      extras: (row.extras || [])
        .filter(ex => ex.activo !== false)
        .sort((a,b) => Number(a.orden || 0) - Number(b.orden || 0))
        .map(ex => ({
          id: ex.id,
          nombre: ex.nombre || '',
          precio: Number(ex.precio || 0),
          unidad: ex.unidad || 'm²',
          nota: ex.nota || '',
          activo: ex.activo !== false,
          orden: Number(ex.orden || 0)
        }))
    }));

    renderCategoriasDatalist();
    render();

    setStatus(`Supabase conectado · ${items.length} producto(s) cargado(s)`, 'ok');
  }catch(err){
    console.error(err);
    setStatus('Error cargando Supabase: ' + (err.message || err), 'err');
    document.getElementById('results').innerHTML = '<div class="empty">No se pudo cargar el listado. Revisa consola y permisos de Supabase.</div>';
  }finally{
    isLoading = false;
  }
}

function renderCategoriasDatalist(){
  const list = document.getElementById('categoriasList');
  const select = document.getElementById('fCategoriaSelect');

  const nombres = [...new Set(
    categorias
      .map(c => toUpperClean(c.nombre))
      .filter(Boolean)
  )].sort((a,b) => a.localeCompare(b,'es'));

  if(list){
    list.innerHTML = nombres.map(nombre => `<option value="${escapeHTML(nombre)}"></option>`).join('');
  }

  if(select){
    const current = select.value;
    select.innerHTML = `
      <option value="">Seleccionar categoría...</option>
      ${nombres.map(nombre => `<option value="${escapeHTML(nombre)}">${escapeHTML(nombre)}</option>`).join('')}
      <option value="__nueva__">+ NUEVA CATEGORÍA</option>
    `;

    if(current && nombres.includes(current)){
      select.value = current;
    }
  }
}
async function getOrCreateCategoria(nombre){
  const db = sb();
  const cleanName = toUpperClean(nombre);
  const key = normalize(cleanName);

  if(!cleanName) throw new Error('Categoría vacía');

  let cat = categorias.find(c => c.nombre_key === key || normalize(c.nombre) === key);
  if(cat) return cat;

  const { data: found, error: findError } = await db
    .from('listado_categorias')
    .select('id,nombre,nombre_key,activo,orden')
    .eq('nombre_key', key)
    .maybeSingle();

  if(findError) throw findError;

  if(found){
    cat = found;
  }else{
    const { data: inserted, error: insertError } = await db
      .from('listado_categorias')
      .insert({
        nombre: cleanName,
        nombre_key: key,
        activo: true,
        orden: categorias.length + 1
      })
      .select('id,nombre,nombre_key,activo,orden')
      .single();

    if(insertError) throw insertError;
    cat = inserted;
  }

  categorias.push(cat);
  renderCategoriasDatalist();
  return cat;
}

function filteredItems(){
  return items.filter(item => {
    if(item.activo === false) return false;
    if(!query) return true;

    const extrasText = (item.extras || []).map(ex => `${ex.nombre} ${ex.nota}`).join(' ');
    const haystack = normalize(`${item.nombre} ${item.categoria} ${item.keywords} ${item.nota} ${extrasText}`);

    return query.split(/\s+/).filter(Boolean).every(t => haystack.includes(normalize(t)));
  });
}

function groupByCategory(list){
  const groups = {};

  list.forEach(item => {
    const cat = item.categoria || 'Sin categoría';
    if(!groups[cat]) groups[cat] = [];
    groups[cat].push(item);
  });

  return Object.keys(groups)
    .sort((a,b) => a.localeCompare(b,'es'))
    .map(cat => ({
      categoria: cat,
      items: groups[cat].sort((a,b) => {
        const o = Number(a.orden || 0) - Number(b.orden || 0);
        if(o !== 0) return o;
        return String(a.nombre).localeCompare(String(b.nombre),'es');
      })
    }));
}

function render(){
  renderResults();
}

function renderResults(){
  const box = document.getElementById('results');
  const list = filteredItems();

  if(!list.length){
    box.innerHTML = '<div class="empty">No hay productos. Agrega el primero desde Administrador.</div>';
    return;
  }

  const groups = groupByCategory(list);

  groups.forEach(g => {
    if(query && !openCategories[g.categoria]) openCategories[g.categoria] = true;
    if(openCategories[g.categoria] === undefined) openCategories[g.categoria] = false;
  });

  box.innerHTML = groups.map(g => {
    const open = !!openCategories[g.categoria];
    return `
      <section class="category-block ${open ? 'open' : ''}">
        <div class="category-title" onclick="toggleCategory('${escapeJS(g.categoria)}')">
          <b>${escapeHTML(g.categoria)}</b>
          <span>${g.items.length}</span>
          <div class="cat-chevron">▾</div>
        </div>
        <div class="category-content">
          ${g.items.map(renderItemCard).join('')}
        </div>
      </section>
    `;
  }).join('');
}

function toggleCategory(cat){
  openCategories[cat] = !openCategories[cat];
  expandedId = null;
  renderResults();
}

function renderItemCard(item){
  const extras = item.extras || [];
  const notas = String(item.nota || '')
    .split(/\r?\n|\s*;\s*/)
    .map(n => n.trim())
    .filter(Boolean);

  const extrasPreview = extras.length
    ? `<div class="mini-extras">${extras.slice(0,3).map(ex => `
        <div class="mini-extra-line">${escapeHTML(ex.nombre)} · +$${Number(ex.precio || 0).toFixed(2)} / ${escapeHTML(ex.unidad || '')}</div>
      `).join('')}${extras.length > 3 ? `<div class="mini-extra-line">+${extras.length - 3} extra(s) más</div>` : ''}</div>`
    : '';

  const notasPreview = notas.length
    ? `<div class="mini-notes">${notas.slice(0,3).map(n => `<div class="mini-note-line">${escapeHTML(n)}</div>`).join('')}</div>`
    : '';

  return `
    <div class="item ${expandedId === item.id ? 'expanded' : ''}">
      <div class="item-head" onclick="toggleItem('${item.id}')">
        <div class="item-info">
          <div class="item-name">${escapeHTML(item.nombre)}</div>
          <div class="item-cat">${escapeHTML(item.categoria || 'Sin categoría')}</div>
          ${item.cantidadMinima ? `<div class="item-preview"><span class="mini-pill orange">Mínimo: ${item.cantidadMinima} ${escapeHTML(item.tipoMinimo || item.unidad)}</span></div>` : ''}
          ${extrasPreview}
          ${notasPreview}
        </div>
        <div class="price-box">
          <div class="price">$${Number(item.precio || 0).toFixed(2)}</div>
          <div class="unit">/${escapeHTML(item.unidad || '')}</div>
        </div>
        <div class="chev">▾</div>
      </div>

      <div class="detail">
        ${notas.length ? `<div class="note">${notas.map(n => `<div>${escapeHTML(n)}</div>`).join('')}</div>` : ''}

        ${extras.length ? `
          <div class="extra-list">
            <div class="extra-title">Adicionales</div>
            ${extras.map(ex => `
              <div class="extra-card">
                <div>
                  <b>${escapeHTML(ex.nombre)}</b>
                  ${ex.nota ? `<small>${escapeHTML(ex.nota)}</small>` : ''}
                </div>
                <div class="extra-price">+$${Number(ex.precio || 0).toFixed(2)} / ${escapeHTML(ex.unidad || '')}</div>
              </div>
            `).join('')}
          </div>
        ` : ''}

        <button class="copy-btn" onclick="copyItem('${item.id}')">📋 Copiar para WhatsApp</button>

        <div class="actions" style="margin-top:10px">
          <button class="btn btn-clear" onclick="editItem('${item.id}')">Editar</button>
          <button class="btn btn-save" onclick="duplicarItem('${item.id}')">Duplicar</button>
        </div>
      </div>
    </div>
  `;
}

function toggleItem(id){
  expandedId = expandedId === id ? null : id;
  renderResults();
}

function setMode(mode){
  const admin = document.getElementById('adminPanel');
  const btnPrecio = document.getElementById('btnPrecio');
  const btnAdmin = document.getElementById('btnAdmin');

  if(mode === 'admin'){
    admin.classList.add('show');
    btnAdmin?.classList.add('active');
    btnPrecio?.classList.remove('active');
    setTimeout(() => admin.scrollIntoView({behavior:'smooth', block:'start'}), 50);
  }else{
    admin.classList.remove('show');
    btnPrecio?.classList.add('active');
    btnAdmin?.classList.remove('active');
    const head = document.querySelector('.listado-head');
    if(head) head.scrollIntoView({behavior:'smooth', block:'start'});
  }
}

function showAdmin(){ setMode('admin'); }
function showPrecio(){ setMode('precio'); }

function addExtra(){
  const nombre = document.getElementById('exNombre').value.trim();
  const precio = parseFloat(document.getElementById('exPrecio').value) || 0;
  const unidad = document.getElementById('exUnidad').value;
  const nota = document.getElementById('exNota').value.trim();

  if(!nombre){
    alert('Coloca el nombre del extra.');
    return;
  }

  tempExtras.push({ nombre, precio, unidad, nota, activo:true });

  document.getElementById('exNombre').value = '';
  document.getElementById('exPrecio').value = '';
  document.getElementById('exNota').value = '';

  renderExtrasAdmin();
}

function renderExtrasAdmin(){
  const box = document.getElementById('extrasAdminList');

  if(!tempExtras.length){
    box.innerHTML = '<div class="note" style="margin-top:8px;margin-bottom:0">Este producto todavía no tiene extras.</div>';
    return;
  }

  box.innerHTML = tempExtras.map((ex,i) => `
    <div class="extra-admin-row">
      <div>
        ${escapeHTML(ex.nombre)} · $${Number(ex.precio || 0).toFixed(2)} / ${escapeHTML(ex.unidad)}
        ${ex.nota ? `<small>${escapeHTML(ex.nota)}</small>` : ''}
      </div>
      <button type="button" onclick="removeExtra(${i})">×</button>
    </div>
  `).join('');
}

function removeExtra(i){
  tempExtras.splice(i,1);
  renderExtrasAdmin();
}

async function saveItem(){
  try{
    const db = await waitForSupabase();

    const nombre = document.getElementById('fNombre').value.trim();
    const categoriaNombre = getCategoriaFormValue();

    if(!nombre){ alert('Coloca el nombre del producto.'); return; }
    if(!categoriaNombre){ alert('Coloca una categoría.'); return; }

    const categoria = await getOrCreateCategoria(categoriaNombre);

    const payload = {
      categoria_id: categoria.id,
      nombre,
      precio: parseFloat(document.getElementById('fPrecio').value) || 0,
      unidad: document.getElementById('fUnidad').value,
      cantidad_minima: parseFloat(document.getElementById('fMinimo').value) || 0,
      tipo_minimo: document.getElementById('fTipoMinimo').value,
      keywords: document.getElementById('fKeywords').value.trim(),
      nota: document.getElementById('fNota').value.trim(),
      activo: document.getElementById('fActivo').checked
    };

    let productoId = editingId;

    if(editingId){
      const { error } = await db
        .from('listado_productos')
        .update(payload)
        .eq('id', editingId);

      if(error) throw error;
    }else{
      const { data, error } = await db
        .from('listado_productos')
        .insert(payload)
        .select('id')
        .single();

      if(error) throw error;
      productoId = data.id;
    }

    await saveExtras(productoId);

    resetForm();
    await loadFromSupabase();
    showToast('Producto guardado en Supabase');
    setMode('precio');
  }catch(err){
    console.error(err);
    alert('Error guardando producto: ' + (err.message || err));
  }
}

async function saveExtras(productoId){
  const db = sb();

  const { error: deleteError } = await db
    .from('listado_extras')
    .delete()
    .eq('producto_id', productoId);

  if(deleteError) throw deleteError;

  if(!tempExtras.length) return;

  const rows = tempExtras.map((ex,index) => ({
    producto_id: productoId,
    nombre: ex.nombre,
    precio: Number(ex.precio || 0),
    unidad: ex.unidad || 'm²',
    nota: ex.nota || '',
    activo: ex.activo !== false,
    orden: index + 1
  }));

  const { error: insertError } = await db
    .from('listado_extras')
    .insert(rows);

  if(insertError) throw insertError;
}

function editItem(id){
  const item = items.find(i => i.id === id);
  if(!item) return;

  editingId = id;
  tempExtras = (item.extras || []).map(ex => ({...ex}));

  document.getElementById('formTitle').textContent = 'Editando producto';
  setMode('admin');

  document.getElementById('fNombre').value = item.nombre || '';
  setCategoriaFormValue(item.categoria || '');
  document.getElementById('fPrecio').value = item.precio || '';
  document.getElementById('fUnidad').value = item.unidad || 'm²';
  document.getElementById('fMinimo').value = item.cantidadMinima || '';
  document.getElementById('fTipoMinimo').value = item.tipoMinimo || item.unidad || 'm²';
  document.getElementById('fKeywords').value = item.keywords || '';
  document.getElementById('fNota').value = item.nota || '';
  document.getElementById('fActivo').checked = item.activo !== false;

  renderExtrasAdmin();
  window.scrollTo({top:0, behavior:'smooth'});
}

function duplicarItem(id){
  const item = items.find(i => i.id === id);
  if(!item) return;

  editingId = null;
  tempExtras = (item.extras || []).map(ex => ({
    nombre: ex.nombre || '',
    precio: Number(ex.precio || 0),
    unidad: ex.unidad || 'm²',
    nota: ex.nota || '',
    activo: ex.activo !== false
  }));

  document.getElementById('formTitle').textContent = 'Duplicando producto';
  setMode('admin');

  document.getElementById('fNombre').value = `${item.nombre || ''} COPIA`.trim();
  setCategoriaFormValue(item.categoria || '');
  document.getElementById('fPrecio').value = item.precio || '';
  document.getElementById('fUnidad').value = item.unidad || 'm²';
  document.getElementById('fMinimo').value = item.cantidadMinima || '';
  document.getElementById('fTipoMinimo').value = item.tipoMinimo || item.unidad || 'm²';
  document.getElementById('fKeywords').value = item.keywords || '';
  document.getElementById('fNota').value = item.nota || '';
  document.getElementById('fActivo').checked = item.activo !== false;

  renderExtrasAdmin();
  showToast('Producto duplicado. Modifica y guarda.');
  window.scrollTo({top:0, behavior:'smooth'});
}

function resetForm(){
  editingId = null;
  tempExtras = [];
  document.getElementById('formTitle').textContent = 'Agregar producto';

  ['fNombre','fCategoria','fPrecio','fMinimo','fKeywords','fNota','exNombre','exPrecio','exNota'].forEach(id => {
    document.getElementById(id).value = '';
  });

  setCategoriaFormValue('');
  document.getElementById('fUnidad').value = 'm²';
  document.getElementById('fTipoMinimo').value = 'm²';
  document.getElementById('exUnidad').value = 'm²';
  document.getElementById('fActivo').checked = true;

  renderExtrasAdmin();
}

async function deleteEditingItem(){
  if(!editingId){
    alert('Primero selecciona un producto para editar.');
    return;
  }

  const item = items.find(i => i.id === editingId);
  const nombre = item ? item.nombre : 'este producto';

  if(!confirm(`¿Seguro que deseas eliminar "${nombre}"?`)) return;

  try{
    const db = await waitForSupabase();

    const { error } = await db
      .from('listado_productos')
      .update({ activo:false })
      .eq('id', editingId);

    if(error) throw error;

    resetForm();
    await loadFromSupabase();
    showToast('Producto eliminado');
    setMode('precio');
  }catch(err){
    console.error(err);
    alert('Error eliminando producto: ' + (err.message || err));
  }
}

function copyItem(id){
  const item = items.find(i => i.id === id);
  if(!item) return;

  let extrasText = '';

  if(item.extras && item.extras.length){
    extrasText = '\nAdicionales:\n' + item.extras
      .map(ex => `+ ${ex.nombre}: $${Number(ex.precio || 0).toFixed(2)} / ${ex.unidad}`)
      .join('\n');
  }

  const text = `${item.nombre}\nCategoría: ${item.categoria}\nPrecio: $${Number(item.precio || 0).toFixed(2)} / ${item.unidad}\n${item.cantidadMinima ? `Mínimo: ${item.cantidadMinima} ${item.tipoMinimo || item.unidad}` : ''}\n${item.nota ? `Nota: ${item.nota}` : ''}${extrasText}`;

  copyText(text.trim());
  showToast('Copiado para WhatsApp');
}

function copyText(text){
  if(navigator.clipboard){
    navigator.clipboard.writeText(text);
    return;
  }

  const ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  ta.remove();
}

function clearSearch(){
  document.getElementById('search').value = '';
  query = '';
  document.getElementById('clearBtn').classList.remove('show');
  render();
}

function showToast(msg){
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');

  clearTimeout(showToast.t);
  showToast.t = setTimeout(() => toast.classList.remove('show'), 1600);
}

function escapeHTML(v){
  return String(v ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#039;');
}

function escapeJS(v){
  return String(v ?? '')
    .replaceAll('\\','\\\\')
    .replaceAll("'","\\'")
    .replaceAll('\n',' ');
}

function updateListadoStickyTop(){
  const header = document.querySelector('.header');
  if(!header) return;
  document.documentElement.style.setProperty('--listado-head-top', header.offsetHeight + 'px');
}

function hookListadoMenuButton(){
  const btn = document.getElementById('mobileMenuBtn');
  if(!btn || btn.dataset.listadoHooked === '1') return;

  btn.dataset.listadoHooked = '1';
  btn.addEventListener('click', () => {
    setTimeout(updateListadoStickyTop, 80);
    setTimeout(updateListadoStickyTop, 260);
  });
}


document.getElementById('search').addEventListener('input', e => {
  query = normalize(e.target.value);
  document.getElementById('clearBtn').classList.toggle('show', !!query);
  render();
});

document.addEventListener('DOMContentLoaded', () => {
  renderExtrasAdmin();
  renderCategoriasDatalist();
  loadFromSupabase();

  updateListadoStickyTop();
  setTimeout(updateListadoStickyTop, 150);
  setTimeout(hookListadoMenuButton, 300);
  setTimeout(updateListadoStickyTop, 700);
});

window.addEventListener('resize', updateListadoStickyTop);
window.addEventListener('load', () => {
  hookListadoMenuButton();
  updateListadoStickyTop();
});
</script>
</body>
</html>
