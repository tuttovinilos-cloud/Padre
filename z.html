<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Probador de IP</title>
<style>
  body { font-family: Arial; padding: 20px; }
  input, button { font-size: 18px; padding: 10px; margin: 5px 0; width: 100%; }
  a { display:block; margin:10px 0; font-size:18px; }
</style>
</head>
<body>

<h2>Probador de cámara/IP</h2>

<input id="ip" value="192.168.0.118" placeholder="IP del dispositivo">

<button onclick="generar()">Generar pruebas</button>

<div id="links"></div>

<script>
function generar() {
  const ip = document.getElementById("ip").value.trim();

  const urls = [
    `http://${ip}`,
    `http://${ip}:80`,
    `http://${ip}:81`,
    `http://${ip}:81/stream`,
    `http://${ip}/stream`,
    `http://${ip}:8080`,
    `http://${ip}:8080/video`,
    `rtsp://${ip}:554/live`,
    `rtsp://${ip}/live`,
    `rtsp://${ip}:554/stream1`
  ];

  document.getElementById("links").innerHTML = urls.map(url => `
    <a href="${url}" target="_blank">${url}</a>
  `).join("");
}
</script>

</body>
</html>
