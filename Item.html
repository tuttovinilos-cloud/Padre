<html lang="es" class="loading-menu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Materia Prima · Tuttovinilos</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/menu.css?v=34">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f9;--panel:#fff;--border:#d9deea;--border2:#cbd3e6;
  --text:#111827;--muted:#6b7280;--accent:#153bff;--accent2:#0b1f7a;
  --orange:#ff8616;--orange2:#fff3e8;--green:#16a34a;--red:#dc2626;
  --head:'Montserrat',Arial,sans-serif;--body:'Inter',Arial,sans-serif;--mono:'Roboto Mono',monospace;
}
html,body{background:var(--bg)!important;color:var(--text);font-family:var(--body);min-height:100vh;color-scheme:light}
button,input,select,textarea{font:inherit;color-scheme:light}
button{cursor:pointer}
.main{padding:12px;max-width:1280px;margin:0 auto}
.page-head{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:14px;box-shadow:0 8px 24px rgba(15,23,42,.055);margin-bottom:12px}
.page-title{font-family:var(--head);font-size:21px;font-weight:900;color:var(--accent2);text-transform:uppercase}
.page-sub{margin-top:4px;color:var(--muted);font-size:13px;font-weight:700;line-height:1.35}
.tools{display:grid;grid-template-columns:1fr auto auto;gap:8px;margin-top:12px}
.search{min-height:40px;border:1px solid var(--border2);border-radius:14px;padding:0 13px;font-size:13px;outline:none;background:white;color:#111827}
.btn{border:0;background:linear-gradient(135deg,var(--accent),#0b1f7a);color:white;border-radius:14px;padding:0 16px;font-family:var(--head);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.4px;min-height:40px;box-shadow:0 8px 18px rgba(21,59,255,.16)}
.btn.orange{background:linear-gradient(135deg,var(--orange),#c2410c);box-shadow:0 8px 18px rgba(255,134,22,.18)}
.btn.light{background:white;color:var(--accent);border:1px solid #c7d2fe;box-shadow:none}
.cats{display:flex;gap:7px;overflow-x:auto;padding:12px 0 2px}
.cat{border:1px solid var(--border2);background:white;color:var(--accent2);border-radius:999px;padding:8px 13px;font-family:var(--head);font-size:10px;font-weight:900;text-transform:uppercase;white-space:nowrap}
.cat.active{background:var(--orange);color:white;border-color:var(--orange);box-shadow:0 7px 16px rgba(255,134,22,.20)}
.list{display:grid;gap:8px}
.item{background:white;border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 6px 18px rgba(15,23,42,.04)}
.item-main{width:100%;border:0;background:white;display:grid;grid-template-columns:92px 1fr 118px 110px 28px;align-items:center;gap:8px;padding:8px 11px;text-align:left}
.badge{display:inline-flex;align-items:center;justify-content:center;background:#eef1ff;color:var(--accent);border:1px solid #c7d2fe;border-radius:999px;padding:5px 8px;font-size:9.5px;font-family:var(--head);font-weight:900;white-space:nowrap}
.badge-wrap{display:flex;align-items:center;gap:6px;min-width:0}
.usage-dot{width:10px;height:10px;border-radius:50%;background:#d1d5db;border:1px solid #cbd5e1;box-shadow:0 0 0 3px rgba(203,213,225,.18);flex:0 0 auto}
.usage-dot.used{background:#16a34a;border-color:#15803d;box-shadow:0 0 0 3px rgba(22,163,74,.18)}
.name{min-width:0}
.name strong{display:block;font-family:var(--head);font-size:15px;font-weight:900;color:var(--accent2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.name small{display:block;margin-top:2px;color:var(--muted);font-size:11px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cell-mini{min-width:0}
.cell-mini small{display:block;font-family:var(--head);font-size:8.5px;font-weight:900;color:#818898;text-transform:uppercase;letter-spacing:.3px}
.cell-mini strong{display:block;margin-top:2px;font-family:var(--mono);font-size:13px;font-weight:900;color:#111827;white-space:nowrap}
.lamina strong{color:var(--accent);font-size:14px}
.best strong{color:var(--green);font-size:13px}
.arrow{width:27px;height:27px;border-radius:50%;background:#eef1ff;color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:900;transition:transform .15s}
.item.open .arrow{transform:rotate(180deg);background:var(--orange2);color:var(--orange)}
.item-details{display:none;border-top:1px solid var(--border);background:linear-gradient(180deg,#fff,#f8f9ff);padding:10px 12px 12px}
.item.open .item-details{display:block}
.provider-title{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px;color:var(--muted);font-family:var(--head);font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.4px}
.provider-title span:last-child{color:var(--orange)}
.provider-list{display:grid;gap:7px}
.provider-row{display:grid;grid-template-columns:34px 1fr 88px 105px 80px 34px;align-items:center;gap:8px;background:white;border:1px solid var(--border);border-radius:13px;padding:8px 10px}
.provider-rank{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#eef1ff;color:var(--accent);font-family:var(--mono);font-size:11px;font-weight:900}
.provider-row:first-child .provider-rank{background:#dcfce7;color:#166534}
.provider-name{font-family:var(--head);font-size:13px;font-weight:900;color:var(--accent2)}
.provider-price{font-family:var(--mono);font-size:14px;font-weight:900;color:#111827;text-align:right}
.provider-m2{font-family:var(--mono);font-size:12px;font-weight:900;color:var(--orange);text-align:right}
.provider-date{font-family:var(--mono);font-size:10px;font-weight:800;color:var(--muted);text-align:right}
.icon-btn{width:30px;height:30px;border-radius:50%;border:1px solid #fed7aa;background:var(--orange2);color:#c2410c;font-weight:900}
.detail-note{margin-top:8px;background:var(--orange2);border:1px solid #fed7aa;border-radius:13px;padding:9px;color:#9a3412;font-size:12px;font-weight:800}
.detail-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:10px;flex-wrap:wrap}
.action{border:1px solid #c7d2fe;background:#eef1ff;color:var(--accent);border-radius:999px;padding:8px 12px;font-family:var(--head);font-size:10px;font-weight:900}
.action.orange{border-color:#fed7aa;background:var(--orange2);color:#c2410c}
.empty{background:white;border:1px dashed var(--border2);border-radius:18px;padding:28px;text-align:center;color:var(--muted);font-family:var(--head);font-weight:900;text-transform:uppercase;display:none}
.backdrop{position:fixed;inset:0;background:rgba(17,24,39,.42);z-index:900;display:none;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(3px)}
.modal{width:100%;max-width:720px;max-height:92vh;overflow:auto;background:#fff;border:1px solid var(--border);border-radius:20px;box-shadow:0 24px 80px rgba(17,24,39,.24)}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border)}
.modal-title{font-family:var(--head);font-size:16px;font-weight:900;color:var(--accent2);text-transform:uppercase}
.close{width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:#fff;color:var(--muted);font-weight:900}
.modal-body{padding:14px;display:grid;gap:12px}
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-family:var(--head);font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--border2);border-radius:13px;background:#fff;color:#111827;min-height:40px;padding:9px 11px;outline:none}
.field input[readonly]{background:#f8f9ff;color:var(--accent2);font-weight:900}
.field textarea{min-height:74px;resize:vertical}
.full{grid-column:1/-1}
.hidden-field{display:none!important}
.format-panel,.catalog-panel{grid-column:1/-1;border:1px solid var(--border);background:#f8f9ff;border-radius:16px;padding:10px}
.panel-title{font-family:var(--head);font-size:11px;font-weight:900;color:var(--accent2);text-transform:uppercase;margin-bottom:8px}
.provider-editor{border:1px solid var(--border);border-radius:16px;background:#f8f9ff;padding:10px}
.provider-editor-title{font-family:var(--head);font-size:11px;font-weight:900;color:var(--accent2);text-transform:uppercase;margin-bottom:8px}
.provider-input-row{display:grid;grid-template-columns:1fr 105px 135px 38px;gap:7px;margin-bottom:7px}
.provider-input-row input{border:1px solid var(--border2);border-radius:12px;min-height:38px;padding:8px 10px}
.remove-provider{border:1px solid #fecaca;background:#fee2e2;color:#991b1b;border-radius:12px;font-weight:900}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:14px 16px;border-top:1px solid var(--border);flex-wrap:wrap}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#111827;color:white;border-radius:999px;padding:10px 16px;font-family:var(--head);font-size:12px;font-weight:900;text-transform:uppercase;z-index:999;display:none}
.loading{text-align:center;padding:28px;color:var(--muted);font-family:var(--head);font-weight:900;text-transform:uppercase}
@media(max-width:760px){
  .main{padding:10px}.page-title{font-size:18px}.tools{grid-template-columns:1fr}.btn{width:100%}
  .item-main{grid-template-columns:78px 1fr 88px 28px;gap:7px;padding:8px 9px}.hide-mobile{display:none}
  .name strong{font-size:14px}.name small{font-size:10.5px}.cell-mini strong{font-size:12px}
  .provider-row{grid-template-columns:28px 1fr 70px 78px 30px}.provider-date{display:none}.provider-price{font-size:13px}.provider-m2{font-size:11px}
  .form-grid{grid-template-columns:1fr}.provider-input-row{grid-template-columns:1fr 82px 1fr 36px}
}
</style>
</head>

<body>
<header class="header">
  <div class="logo">
    <img src="Logo tutto1.svg" alt="Tutto Vinilos">
    <small>COMANDA</small>
  </div>
  <nav class="header-tabs" data-auth-menu id="authMenu"></nav>
</header>

<main class="main">
  <section class="page-head">
    <h1 class="page-title">Materia prima</h1>
    <p class="page-sub">Conectado a Supabase. Lista única, categorías dinámicas, proveedores y precio por m².</p>

    <div class="tools">
      <input class="search" id="searchInput" placeholder="Buscar transparente, AR2, Vecxel, PVC, 3mm...">
      <button class="btn" type="button" onclick="openMaterialModal()">+ Añadir material</button>
      <button class="btn light" type="button" onclick="loadAll()">Recargar</button>
    </div>

    <div class="cats" id="categoryTabs"></div>
  </section>

  <section class="list" id="materialList">
    <div class="loading">Cargando materia prima...</div>
  </section>
  <div class="empty" id="emptyState">Sin materiales encontrados</div>
</main>

<datalist id="proveedoresDatalist"></datalist>

<div class="backdrop" id="materialBackdrop" onclick="backdropClick(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle">Añadir material</div>
      <button class="close" type="button" onclick="closeMaterialModal()">✕</button>
    </div>

    <div class="modal-body">
      <div class="catalog-panel">
        <div class="panel-title">Catálogo rápido</div>
        <div class="field">
          <label>Usar plantilla existente o crear nuevo</label>
          <select id="catalogSelect" onchange="applyCatalogTemplate()">
            <option value="">Crear nuevo material</option>
          </select>
        </div>
      </div>

      <div class="form-grid">
        <div class="field">
          <label>Categoría</label>
          <select id="f_categoria" onchange="toggleNuevaCategoria(); aplicarDetallePorCategoria()"></select>
        </div>

        <div class="field" id="nuevaCategoriaBox" style="display:none">
          <label>Nueva categoría</label>
          <input id="f_nueva_categoria" placeholder="Ej: ACM, MDF, HERRAJES">
        </div>

        <div class="field">
          <label>Nombre / acabado</label>
          <input id="f_nombre" placeholder="Ej: Blanco, Transparente, Opal">
        </div>

        <div class="field">
          <label>Tipo de detalle</label>
          <select id="f_detalle_label" onchange="toggleNuevoTipoDetalle()"></select>
        </div>

        <div class="field" id="nuevoTipoDetalleBox" style="display:none">
          <label>Nuevo tipo de detalle</label>
          <input id="f_nuevo_detalle_label" placeholder="Ej: VOLTAJE, AMPERAJE, DIÁMETRO" oninput="forceUppercase(this)">
        </div>

        <div class="field">
          <label>Valor del detalle</label>
          <input id="f_detalle_valor" placeholder="Ej: 3MM, 25X19, REF200, BOTELLA 1L" oninput="forceUppercase(this)">
        </div>

        <div class="format-panel">
          <div class="panel-title">Formato / tipo de cálculo</div>
          <div class="form-grid">
            <div class="field">
              <label>Tipo</label>
              <select id="f_tipo_medida" onchange="toggleTipoMedida()">
                <option value="M2">M²</option>
                <option value="M">M</option>
                <option value="UNITARIO">Unitario</option>
              </select>
            </div>

            <div class="field medida-m2">
              <label>Ancho cm</label>
              <input id="f_ancho_cm" type="number" step="0.01" placeholder="Ej: 120">
            </div>

            <div class="field medida-m2">
              <label>Alto / largo cm</label>
              <input id="f_largo_cm" type="number" step="0.01" placeholder="Ej: 240">
            </div>

            <div class="field medida-m">
              <label>Metros lineales</label>
              <input id="f_metros_lineales" type="number" step="0.01" placeholder="Ej: 50">
            </div>

            <div class="field medida-m2">
              <label>Área m² automático</label>
              <input id="f_area" type="number" step="0.0001" readonly placeholder="0.0000">
            </div>

            <div class="field full">
              <label>Formato visible</label>
              <input id="f_formato" placeholder="Se genera automático">
            </div>
          </div>
        </div>

        <div class="field full">
          <label>Nota</label>
          <textarea id="f_nota" placeholder="Ej: Usado para logos corpóreos, base, impresión, etc."></textarea>
        </div>
      </div>

      <div class="provider-editor">
        <div class="provider-editor-title">Proveedores y precios</div>
        <div id="providerInputs"></div>
        <button class="action orange" type="button" onclick="addProviderInput()">+ Añadir proveedor</button>
      </div>
    </div>

    <div class="modal-foot">
      <button class="btn light" type="button" onclick="closeMaterialModal()">Cancelar</button>
      <button class="btn orange" type="button" onclick="saveMaterial()">Guardar material</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js?v=24"></script>
<script src="js/auth.js?v=24"></script>
<script src="js/menu.js?v=11"></script>

<script>
let categorias = [];
let materiales = [];
let materialUsageMap = {};
let categoriaActual = "TODOS";
let editId = null;

function forceUppercase(input){
  if(!input) return;
  const start = input.selectionStart;
  const end = input.selectionEnd;
  input.value = String(input.value || "").toUpperCase();
  try{ input.setSelectionRange(start, end); }catch(e){}
}

function proveedoresExistentes(){
  const set = new Set();
  materiales.forEach(m => {
    (m.proveedores || []).forEach(p => {
      const nombre = String(p.proveedor || p.nombre || "").trim().toUpperCase();
      if(nombre) set.add(nombre);
    });
  });
  return [...set].sort();
}

function renderProveedoresDatalist(){
  const dl = document.getElementById("proveedoresDatalist");
  if(!dl) return;
  dl.innerHTML = proveedoresExistentes()
    .map(nombre => `<option value="${nombre}"></option>`)
    .join("");
}

const catalogoBase = [
  {categoria:"PVC", nombre:"Blanco", detalle_label:"ESPESOR", detalle_valor:"3MM", espesor:"3MM", tipo_medida:"M2", ancho_cm:120, largo_cm:240, metros_lineales:0, nota:"PVC blanco estándar."},
  {categoria:"PVC", nombre:"Blanco", detalle_label:"ESPESOR", detalle_valor:"5MM", espesor:"5MM", tipo_medida:"M2", ancho_cm:120, largo_cm:240, metros_lineales:0, nota:"PVC blanco intermedio."},
  {categoria:"PVC", nombre:"Blanco", detalle_label:"ESPESOR", detalle_valor:"9MM", espesor:"9MM", tipo_medida:"M2", ancho_cm:120, largo_cm:240, metros_lineales:0, nota:"PVC blanco para corpóreos."},
  {categoria:"ACRILICO", nombre:"Transparente", detalle_label:"ESPESOR", detalle_valor:"3MM", espesor:"3MM", tipo_medida:"M2", ancho_cm:120, largo_cm:240, metros_lineales:0, nota:"Acrílico transparente."},
  {categoria:"ACRILICO", nombre:"Transparente", detalle_label:"ESPESOR", detalle_valor:"5MM", espesor:"5MM", tipo_medida:"M2", ancho_cm:120, largo_cm:240, metros_lineales:0, nota:"Acrílico transparente grueso."},
  {categoria:"VINIL", nombre:"Adhesivo Blanco", detalle_label:"REFERENCIA", detalle_valor:"REF", espesor:"REF", tipo_medida:"M", ancho_cm:0, largo_cm:0, metros_lineales:50, nota:"Rollo de vinil adhesivo."}
];

function sb(){
  return window.supabaseClient || window.supabase;
}

function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.display = "block";
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=> el.style.display = "none", 2400);
}

function calcArea(anchoCm, largoCm){
  const a = Number(anchoCm || 0);
  const l = Number(largoCm || 0);
  if(!a || !l) return 0;
  return (a / 100) * (l / 100);
}

function tipoMedidaActual(){
  return document.getElementById("f_tipo_medida")?.value || "M2";
}

function formatoVisible(tipo, anchoCm, largoCm, metrosLineales){
  if(tipo === "M2"){
    if(!anchoCm || !largoCm) return "";
    return `${Number(anchoCm)} × ${Number(largoCm)} cm`;
  }

  if(tipo === "M"){
    if(!metrosLineales) return "";
    return `${Number(metrosLineales)} m`;
  }

  return "Unitario";
}

function toggleTipoMedida(){
  const tipo = tipoMedidaActual();

  document.querySelectorAll(".medida-m2").forEach(el => {
    el.classList.toggle("hidden-field", tipo !== "M2");
  });

  document.querySelectorAll(".medida-m").forEach(el => {
    el.classList.toggle("hidden-field", tipo !== "M");
  });

  autoFormatoYArea();
}

function normalCat(v){
  return String(v || "").trim().toUpperCase();
}

function detalleLabelSugerido(categoria){
  const cat = normalCat(categoria);

  const mapa = {
    "PVC":"ESPESOR",
    "ACRILICO":"ESPESOR",
    "ACRÍLICO":"ESPESOR",
    "MDF":"ESPESOR",
    "MDP":"ESPESOR",
    "ACM":"ESPESOR",
    "VINIL":"ROLLO",
    "LONA":"ROLLO",
    "PERNOS":"MEDIDA",
    "HERRAJE":"MEDIDA",
    "HERRAJES":"MEDIDA",
    "TINTA":"PRESENTACIÓN",
    "TINTAS":"PRESENTACIÓN",
    "LED":"TIPO",
    "CABLE":"CALIBRE",
    "ADHESIVO":"FORMATO",
    "ADHESIVOS":"FORMATO",
    "FÓRMICA":"FORMATO",
    "FORMICA":"FORMATO"
  };

  return mapa[cat] || "TIPO";
}

const tiposDetalleBasePorCategoria = {
  "PVC":["ESPESOR"],
  "ACRILICO":["ESPESOR"],
  "ACRÍLICO":["ESPESOR"],
  "MDF":["ESPESOR"],
  "MDP":["ESPESOR"],
  "ACM":["ESPESOR"],
  "VINIL":["ROLLO"],
  "LONA":["ROLLO"],
  "PERNOS":["MEDIDA"],
  "HERRAJE":["MEDIDA"],
  "HERRAJES":["MEDIDA"],
  "TORNILLOS":["MEDIDA"],
  "TINTA":["PRESENTACIÓN"],
  "TINTAS":["PRESENTACIÓN"],
  "LED":["TIPO"],
  "CABLE":["CALIBRE"],
  "ADHESIVO":["FORMATO"],
  "ADHESIVOS":["FORMATO"],
  "FÓRMICA":["FORMATO"],
  "FORMICA":["FORMATO"]
};

const tiposDetalleGlobales = [
  "ESPESOR",
  "MEDIDA",
  "REFERENCIA",
  "PRESENTACIÓN",
  "TIPO",
  "FORMATO",
  "CALIBRE",
  "COLOR",
  "ACABADO",
  "MODELO",
  "VOLTAJE",
  "AMPERAJE",
  "DIÁMETRO",
  "LONGITUD",
  "CAPACIDAD",
  "ROSCA",
  "GRAMAJE",
  "ROLLO",
  "PLIEGO"
];

function tiposDetalleParaCategoria(categoria){
  const cat = normalCat(categoria);
  const set = new Set(tiposDetalleBasePorCategoria[cat] || []);

  materiales.forEach(m => {
    if(normalCat(m.categoria) === cat){
      const label = String(m.detalle_label || "").trim().toUpperCase();
      if(label) set.add(label);
    }
  });

  if(!set.size){
    set.add(detalleLabelSugerido(cat));
  }

  return [...set].sort((a,b)=>a.localeCompare(b, "es", {numeric:true}));
}

function poblarSelectTipoDetalle(valorPreferido = ""){
  const select = document.getElementById("f_detalle_label");
  if(!select) return;

  const categoria = categoriaFormulario ? categoriaFormulario() : document.getElementById("f_categoria")?.value;
  const tipos = tiposDetalleParaCategoria(categoria);
  const preferido = String(valorPreferido || "").toUpperCase();

  select.innerHTML = tipos

function proveedoresOrdenados(item){
  return [...(item.proveedores || [])].sort((a,b)=>Number(a.precio||0)-Number(b.precio||0));
}

function minPrecio(item){
  const prov = proveedoresOrdenados(item);
  return prov.length ? Number(prov[0].precio || 0) : 0;
}

function maxPrecio(item){
  const prov = proveedoresOrdenados(item);
  return prov.length ? Number(prov[prov.length-1].precio || 0) : 0;
}

function mejorProveedor(item){
  const prov = proveedoresOrdenados(item);
  return prov.length ? prov[0].proveedor : "-";
}

function costoM2(precio, area, tipo = "M2", metros = 0){
  if(tipo === "M"){
    if(!metros || metros <= 0) return "-";
    return "$" + (Number(precio || 0) / metros).toFixed(2);
  }

  if(tipo === "UNITARIO"){
    return "$" + Number(precio || 0).toFixed(2);
  }

  if(!area || area<=0) return "-";
  return "$" + (Number(precio || 0) / area).toFixed(2);
}

function rangoLamina(item){
  const min = minPrecio(item), max = maxPrecio(item);
  if(!min && !max) return "-";
  return min === max ? "$" + min : "$" + min + " – $" + max;
}

function nombreBaseSinCorrelativo(nombre){
  return String(nombre || "")
    .trim()
    .toUpperCase()
    .replace(/\s+\d+$/, "");
}

function generarNombreCorrelativoDesdeLista(nombre, nombresExistentes){
  const base = nombreBaseSinCorrelativo(nombre);
  const existentes = new Set((nombresExistentes || []).map(n => String(n || "").trim().toUpperCase()));

  if(!existentes.has(base)){
    return base;
  }

  let n = 1;
  let candidato = `${base} ${n}`;

  while(existentes.has(candidato)){
    n++;
    candidato = `${base} ${n}`;
  }

  return candidato;
}

async function validarMaterialUnicoDb(client, categoriaFinal, nombreOriginal, detalleValorFinal, idIgnorar = null){
  const cat = normalCat(categoriaFinal);
  const nombre = String(nombreOriginal || "").trim().toUpperCase();
  const espesor = String(detalleValorFinal || "").trim().toUpperCase();

  const { data, error } = await client
    .from("materia_materiales")
    .select("id,nombre,categoria,espesor")
    .eq("categoria", cat)
    .eq("espesor", espesor)
    .eq("activo", true);

  if(error){
    console.error(error);
    toast("Error validando material");
    return null;
  }

  const nombresExistentes = (data || [])
    .filter(m => Number(m.id) !== Number(idIgnorar))
    .map(m => String(m.nombre || "").trim().toUpperCase());

  const nombreFinal = generarNombreCorrelativoDesdeLista(nombre, nombresExistentes);

  if(nombreFinal !== nombre){
    const aceptar = confirm(
      `Ya existe un material con la misma categoría, nombre y espesor:\n\n` +
      `${cat} · ${nombre} · ${espesor || "SIN DETALLE"}\n\n` +
      `¿Quieres guardarlo como "${nombreFinal}"?`
    );

    if(!aceptar){
      toast("Guardado cancelado");
      return null;
    }
  }

  return nombreFinal;
}

async function saveMaterial(){
  const client = sb();
  if(!client){ toast("No hay conexión Supabase"); return; }

  const tipoMedida = tipoMedidaActual();
  const anchoCm = tipoMedida === "M2" ? Number(document.getElementById("f_ancho_cm").value || 0) : 0;
  const largoCm = tipoMedida === "M2" ? Number(document.getElementById("f_largo_cm").value || 0) : 0;
  const metrosLineales = tipoMedida === "M" ? Number(document.getElementById("f_metros_lineales").value || 0) : 0;
  const area = tipoMedida === "M2" ? calcArea(anchoCm, largoCm) : 0;
  const categoriaFinal = categoriaFormulario();

  const proveedores = [...document.querySelectorAll(".provider-input-row")].map(row => ({
    proveedor: row.querySelector(".p_nombre").value.trim().toUpperCase(),
    precio: Number(row.querySelector(".p_precio").value || 0),
    fecha: row.querySelector(".p_fecha").value || new Date().toISOString().slice(0,10)
  })).filter(p => p.proveedor && p.precio > 0);

  if(!categoriaFinal){ toast("Falta categoría"); return; }

  const nombreOriginal = document.getElementById("f_nombre").value.trim().toUpperCase();

  if(!nombreOriginal){ toast("Falta nombre"); return; }
  if(tipoMedida === "M2" && (!anchoCm || !largoCm)){ toast("Falta ancho o alto en cm"); return; }
  if(tipoMedida === "M" && !metrosLineales){ toast("Falta cantidad de metros lineales"); return; }
  if(!proveedores.length){ toast("Agrega al menos un proveedor"); return; }

  const detalleLabelFinal = detalleLabelActual();
  const detalleValorFinal = detalleValorActual();

  if(!detalleLabelFinal){
    toast("Falta tipo de detalle");
    return;
  }

  const nombreFinal = await validarMaterialUnicoDb(client, categoriaFinal, nombreOriginal, detalleValorFinal, editId);

  if(!nombreFinal){
    return;
  }

  document.getElementById("f_nombre").value = nombreFinal;
  document.getElementById("f_detalle_label").value = detalleLabelFinal;
  document.getElementById("f_detalle_valor").value = detalleValorFinal;

  await client.from("materia_categorias").upsert({ nombre: categoriaFinal }, { onConflict:"nombre" });

  const payload = {
    categoria: categoriaFinal,
    nombre: nombreFinal,
    detalle_label: detalleLabelFinal,
    detalle_valor: detalleValorFinal,
    espesor: detalleValorFinal,
    tipo_medida: tipoMedida,
    ancho_cm: anchoCm,
    largo_cm: largoCm,
    metros_lineales: metrosLineales,
    formato: document.getElementById("f_formato").value.trim(),
    area_m2: Number(area.toFixed(4)),
    nota: document.getElementById("f_nota").value.trim(),
    activo: true,
    updated_at: new Date().toISOString()
  };

  let materialId = editId;

  if(editId === null){
    const { data, error } = await client
      .from("materia_materiales")
      .insert(payload)
      .select()
      .single();

    if(error){ console.error(error); toast("Error guardando material"); return; }
    materialId = data.id;
  }else{
    const { error } = await client
      .from("materia_materiales")
      .update(payload)
      .eq("id", editId);

    if(error){ console.error(error); toast("Error actualizando material"); return; }

    const { error: delError } = await client
      .from("materia_precios")
      .delete()
      .eq("material_id", editId);

    if(delError){ console.error(delError); toast("Error limpiando precios"); return; }
  }

  const precioPayload = proveedores.map(p => ({
    material_id: materialId,
    proveedor: p.proveedor,
    precio: p.precio,
    fecha: p.fecha
  }));

  const { error: precioError } = await client.from("materia_precios").insert(precioPayload);
  if(precioError){ console.error(precioError); toast("Material guardado, error en precios"); return; }

  toast(editId === null ? "Material agregado" : "Material actualizado");
  closeMaterialModal();
  await loadAll();
}

      const labelB = String(b.detalle_label || "").toUpperCase();

      const detA = String(a.detalle_valor || a.espesor || "").toUpperCase();
      const detB = String(b.detalle_valor || b.espesor || "").toUpperCase();

      return catA.localeCompare(catB, "es", {numeric:true})
        || nomA.localeCompare(nomB, "es", {numeric:true})
        || labelA.localeCompare(labelB, "es", {numeric:true})
        || detA.localeCompare(detB, "es", {numeric:true});
    });

  document.getElementById("materialList").innerHTML = lista.map(item=>{
    const proveedores = proveedoresOrdenados(item);

    return `
      <article class="item" id="item_${item.id}">
        <button class="item-main" type="button" onclick="toggleItem(${item.id})">
          <span class="badge-wrap" title="${textoUsoMaterial(item.id)}">
            <span class="usage-dot ${materialEstaEnUso(item.id) ? "used" : ""}"></span>
            <span class="badge">${item.categoria}</span>
          </span>

          <span class="name">
            <strong>${item.nombre}</strong>
            <small>${item.detalle_label || "DETALLE"}: ${item.detalle_valor || item.espesor || "-"} · ${item.tipo_medida || "M2"} · ${item.formato}${item.tipo_medida === "M2" ? " · " + Number(item.area || 0).toFixed(2) + " m²" : ""}</small>
          </span>

          <span class="cell-mini lamina">
            <small>Lámina</small>
            <strong>${rangoLamina(item)}</strong>
          </span>

          <span class="cell-mini best hide-mobile">
            <small>Mejor prov.</small>
            <strong>${mejorProveedor(item)}</strong>
          </span>

          <span class="arrow">⌄</span>
        </button>

        <div class="item-details">
          <div class="provider-title">
            <span>Proveedores de menor a mayor</span>
            <span>Precio lámina · Precio m²</span>
          </div>

          <div class="provider-list">
            ${proveedores.map((p, idx)=>`
              <div class="provider-row">
                <div class="provider-rank">${idx + 1}</div>
                <div class="provider-name">${p.proveedor}</div>
                <div class="provider-price">$${p.precio}</div>
                <div class="provider-m2">${costoM2(p.precio, item.area, item.tipo_medida, item.metros_lineales)} ${item.tipo_medida === "M" ? "/m" : (item.tipo_medida === "UNITARIO" ? "/und" : "/m²")}</div>
                <div class="provider-date">${p.fecha || "-"}</div>
                <button class="icon-btn" type="button" onclick="event.stopPropagation(); openMaterialModal(${item.id})">✎</button>
              </div>
            `).join("")}
          </div>

          ${materialEstaEnUso(item.id) ? `<div class="detail-note">🟢 ${textoUsoMaterial(item.id)}. Cuidado: este material está enlazado al cotizador/compuestos.</div>` : ""}
          ${item.nota ? `<div class="detail-note">${item.nota}</div>` : ""}

          <div class="detail-actions">
            <button class="action" type="button" onclick="event.stopPropagation(); openMaterialModal(${item.id})">Editar material</button>
            <button class="action orange" type="button" onclick="event.stopPropagation(); addPriceToMaterial(${item.id})">+ Precio proveedor</button>
            <button class="action" type="button" onclick="event.stopPropagation(); duplicateMaterial(${item.id})">Duplicar</button>
            <button class="action" type="button" onclick="event.stopPropagation(); deleteMaterial(${item.id})">Eliminar</button>
          </div>
        </div>
      </article>
    `;
  }).join("");

  document.getElementById("emptyState").style.display = lista.length ? "none" : "block";
}

document.getElementById("searchInput").addEventListener("input", render);

window.addEventListener("load", async function(){
  document.documentElement.classList.remove("loading-menu");
  document.documentElement.classList.add("menu-ready");
  await loadAll();
});
</script>
</body>
</html>
