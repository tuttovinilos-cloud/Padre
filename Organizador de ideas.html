<head>

<title>TUTTOPROYECTO · Organizador</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --azul:#153bff;--azul2:#0b1f7a;--bg:#f3f5fb;--card:#fff;
  --line:#dbe2f2;--line2:#c6d0e4;--text:#101827;--muted:#667085;
  --soft:#f1f4fa;--red:#dc2626;--redbg:#fee2e2;--green:#16a34a;
  --greenbg:#dcfce7;--yellow:#d97706;--yellowbg:#fef3c7;
  --black:#111827;--orange:#ff8616;--shadow:0 14px 35px rgba(15,23,42,.08);
  --head:'Montserrat',Arial,sans-serif;--body:'Inter',Arial,sans-serif;--mono:'Roboto Mono',monospace;
}
body{font-family:var(--body);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:90px}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
a{text-decoration:none;color:inherit}

.top{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:1000;box-shadow:0 8px 24px rgba(15,23,42,.06)}
.top-inner{max-width:1440px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:14px}
.logo img{height:42px;display:block}
.top-info{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--muted)}
.app-menu-btn{display:none;margin-left:auto;border:none;background:var(--azul);color:#fff;border-radius:12px;padding:10px 12px;font-weight:900}
.app-menu{margin-left:auto;display:flex;align-items:center;gap:6px;overflow-x:auto}
.app-menu a,.app-menu button{border:none;border-radius:999px;padding:8px 10px;background:#f1f4fa;color:var(--azul2);font-family:var(--head);font-size:9px;font-weight:900;text-transform:uppercase;white-space:nowrap}
.app-menu a.active{background:var(--azul);color:#fff}
.app-menu button{background:#111827;color:#fff}

.wrap{max-width:1440px;margin:0 auto;padding:10px 16px 16px}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:20px;padding:14px;box-shadow:0 8px 24px rgba(15,23,42,.055);position:relative;overflow:hidden}
.kpi:before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--azul)}
.kpi.red:before{background:var(--red)}
.kpi.green:before{background:var(--green)}
.kpi.yellow:before{background:var(--yellow)}
.kpi.black:before{background:var(--black)}
.kpi.orange:before{background:var(--orange)}
.kpi small{display:block;color:var(--muted);font-family:var(--head);font-size:10px;font-weight:900;text-transform:uppercase;margin-bottom:5px}
.kpi strong{font-family:var(--head);font-size:28px;color:var(--azul2)}

.toolbar{background:#fff;border:1px solid var(--line);border-radius:24px;padding:10px;box-shadow:var(--shadow);display:grid;grid-template-columns:1.5fr repeat(4,minmax(120px,.45fr));gap:8px;position:sticky;top:72px;z-index:900;margin-bottom:14px}
.field{width:100%;border:1px solid var(--line2);background:#fff;border-radius:14px;padding:11px 12px;color:var(--text);outline:none;font-size:13px}
.field:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(21,59,255,.12)}

.panel{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);overflow:hidden}
.panel-head{padding:14px 16px;background:linear-gradient(180deg,#fff,#f7f8ff);border-bottom:1px solid var(--line)}
.panel-title{font-family:var(--head);font-size:20px;font-weight:900;color:var(--azul2)}

.projects{padding:12px;display:grid;gap:12px}
.project{border:1px solid var(--line);border-radius:22px;background:#fff;overflow:hidden}
.project.open{border-color:#b9c6ff;box-shadow:0 14px 36px rgba(21,59,255,.09)}

.project-summary{display:grid;grid-template-columns:54px 1fr auto 42px;gap:12px;align-items:center;padding:13px;cursor:pointer}
.num{height:44px;width:44px;border-radius:15px;background:linear-gradient(135deg,var(--azul),var(--azul2));display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--mono);font-size:13px;font-weight:800}
.project-name h2{font-family:var(--head);font-size:19px;font-weight:900;color:var(--text);line-height:1.1}
.mini{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
.chip{display:inline-flex;align-items:center;gap:5px;border-radius:999px;border:1px solid var(--line);background:#f8f9ff;padding:5px 8px;font-size:11px;color:#475467;font-weight:700}
.badge{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:8px 10px;font-family:var(--head);font-size:10px;font-weight:900;text-transform:uppercase;min-width:86px;border:1px solid transparent}
.st-solicitud{background:var(--redbg);color:var(--red);border-color:#fecaca}
.st-pendiente{background:#fff7ed;color:#ea580c;border-color:#fed7aa}
.st-curso{background:#111827;color:#fff;border-color:#111827}
.st-revision{background:var(--yellowbg);color:#92400e;border-color:#fde68a}
.st-listo{background:var(--greenbg);color:#166534;border-color:#bbf7d0}
.st-entregado{background:#e0f2fe;color:#075985;border-color:#bae6fd}
.st-bloqueado{background:#f3e8ff;color:#6d28d9;border-color:#ddd6fe}
.toggle{width:38px;height:38px;border:1px solid var(--line2);border-radius:13px;background:#fff;color:var(--azul);font-weight:900;font-size:18px}
.project.open .toggle{transform:rotate(180deg)}

.detail{display:none;background:#f7f8ff;border-top:1px solid var(--line);padding:12px}
.project.open .detail{display:block}
.project-info{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px;margin-bottom:10px}
.info-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.label{font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;margin-bottom:4px;display:block}
.mini-input{width:100%;border:1px solid var(--line2);background:#fff;border-radius:12px;padding:9px 10px;font-size:12px;outline:none}
textarea.mini-input{min-height:62px;resize:vertical}
.wide{grid-column:1/-1}

.btn{border:none;border-radius:14px;padding:10px 12px;background:var(--azul);color:#fff;font-family:var(--head);font-weight:900;font-size:12px}
.btn.danger{background:var(--red)}
.btn.full{width:100%}
.small-btn{border:none;border-radius:11px;background:var(--soft);color:var(--azul2);font-weight:900;padding:8px 9px;font-size:11px}
.small-btn.blue{background:var(--azul);color:#fff}
.small-btn.red{background:var(--redbg);color:var(--red)}

.items-wrap{display:grid;gap:8px}
.item-card{border:1px solid var(--line);background:#fff;border-radius:17px;overflow:hidden}
.item-summary{display:grid;grid-template-columns:1fr auto 34px;gap:8px;align-items:center;padding:10px;cursor:pointer;background:#fff}
.item-title{font-family:var(--head);font-size:14px;font-weight:900}
.item-sub{font-size:11px;color:var(--muted);margin-top:4px;display:flex;flex-wrap:wrap;gap:5px}
.item-sub span{background:#f8f9ff;border:1px solid var(--line);border-radius:999px;padding:4px 7px}
.item-progress{font-family:var(--mono);font-size:11px;font-weight:900;color:var(--azul2)}
.item-detail{display:none;border-top:1px solid var(--line);background:#fbfcff;padding:10px}
.item-card.open .item-detail{display:block}
.item-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.hidden{display:none!important}

.process-title{font-family:var(--head);font-size:12px;font-weight:900;color:var(--azul2);margin:4px 0 7px}
.process-list{display:grid;gap:5px}
.process{display:grid;grid-template-columns:22px 1fr 118px 26px;gap:6px;align-items:center;border:1px solid var(--line);border-radius:12px;background:#fff;padding:5px 6px}
.process input[type="checkbox"]{width:17px;height:17px;accent-color:var(--azul)}
.process.done .process-name{text-decoration:line-through;color:var(--muted)}
.process-name{font-size:12px;font-weight:800;line-height:1.2}
.process select{height:30px;padding:4px 6px;font-size:10px;border-radius:9px}
.xbtn{width:25px;height:25px;border:none;border-radius:8px;background:var(--redbg);color:var(--red);font-weight:900}
.add-row{display:grid;grid-template-columns:1fr 140px auto;gap:8px;margin-top:9px;border:1px dashed var(--line2);border-radius:15px;background:#fff;padding:8px}
.add-item-row{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:10px}

.drawer-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:2000;display:none}
.drawer-backdrop.show{display:block}
.drawer{position:fixed;right:0;top:0;bottom:0;width:min(470px,94vw);background:#fff;z-index:2100;box-shadow:-20px 0 60px rgba(15,23,42,.25);transform:translateX(104%);transition:.22s;padding:16px;overflow:auto}
.drawer.show{transform:translateX(0)}
.drawer-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.drawer h2{font-family:var(--head);color:var(--azul2);font-size:20px}
.close{border:none;background:#f1f4fa;border-radius:12px;width:38px;height:38px;font-weight:900}
.drawer-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.fab{position:fixed;right:18px;bottom:18px;width:58px;height:58px;border:none;border-radius:50%;background:linear-gradient(135deg,var(--azul),var(--azul2));color:#fff;font-size:30px;box-shadow:0 18px 34px rgba(21,59,255,.3);z-index:1500}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(30px);background:#111827;color:#fff;border-radius:999px;padding:12px 16px;font-size:12px;font-weight:800;opacity:0;pointer-events:none;transition:.22s;z-index:3000}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:1180px){
  .kpis{grid-template-columns:repeat(3,1fr)}
  .toolbar{grid-template-columns:1fr 1fr 1fr}
  .info-grid{grid-template-columns:repeat(2,1fr)}
  .item-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:760px){
  .top-inner{padding:8px 10px}
  .logo img{height:34px}
  .top-info{display:none}
  .app-menu-btn{display:block}
  .app-menu{display:none;position:absolute;left:10px;right:10px;top:58px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:10px;flex-direction:column;align-items:stretch;box-shadow:var(--shadow)}
  .app-menu.open{display:flex}
  .app-menu a,.app-menu button{text-align:left;font-size:11px;padding:11px 12px}
  .wrap{padding:8px}
  .kpis{grid-template-columns:repeat(3,1fr);gap:8px}
  .kpi{padding:10px 8px;border-radius:14px}
  .kpi small{font-size:8px}
  .kpi strong{font-size:20px}
  .toolbar{top:58px;grid-template-columns:repeat(4,1fr);padding:8px;border-radius:18px}
  .toolbar .search{grid-column:1/-1}
  .toolbar select{font-size:10px;padding:9px 6px}
  .project-summary{grid-template-columns:42px 1fr 34px;padding:10px;gap:8px}
  .project-summary>.badge{display:none}
  .num{height:36px;width:36px;border-radius:12px;font-size:12px}
  .project-name h2{font-size:17px}
  .mini .chip:nth-child(n+4){display:none}
  .detail{padding:8px}
  .info-grid,.item-grid,.drawer-grid{grid-template-columns:1fr}
  .item-summary{grid-template-columns:1fr 34px}
  .item-progress{display:none}
  .process{grid-template-columns:22px 1fr 92px 24px;padding:5px;gap:5px}
  .process-name{font-size:11px}
  .process select{font-size:9px;height:28px;padding:3px}
  .xbtn{width:23px;height:23px}
  .add-row,.add-item-row{grid-template-columns:1fr}
  .drawer{width:100vw}
  .fab{right:12px;bottom:12px}
}
</style>

<body>

<header class="header">
  <div class="logo">
    <img src="Logo tutto1.svg" alt="Tutto Vinilos">
    <small>COMANDA</small>
  </div>

  <nav class="header-tabs" data-auth-menu id="authMenu"></nav>
</header>

<div class="wrap">
  <section class="kpis" id="kpis"></section>

  <section class="toolbar">
    <input id="q" class="field search" placeholder="Buscar proyecto, cliente, ítem, proceso o responsable..." oninput="render()">
    <select id="filterStatus" class="field" onchange="render()"><option value="">Estados</option></select>
    <select id="filterResp" class="field" onchange="render()"><option value="">Responsables</option></select>
    <select id="filterLight" class="field" onchange="render()"><option value="">Luz</option><option>Sí</option><option>No</option><option>Por definir</option></select>
    <select id="sortBy" class="field" onchange="render()"><option value="entrega">Entrega</option><option value="estado">Estado</option><option value="progreso">Progreso</option><option value="nombre">Nombre</option></select>
  </section>

  <section class="panel">
    <div class="panel-head">
      <div class="panel-title">Proyectos activos</div>
    </div>
    <div class="projects" id="projects"></div>
  </section>
</div>

<div class="drawer-backdrop" id="backdrop" onclick="closeDrawer()"></div>

<aside class="drawer" id="drawer">
  <div class="drawer-head">
    <h2>Nuevo proyecto</h2>
    <button class="close" onclick="closeDrawer()">×</button>
  </div>

  <div class="drawer-grid">
    <div class="wide"><label class="label">Nombre del proyecto</label><input id="np_nombre" class="mini-input" placeholder="Ej: Tijerazo"></div>
    <div><label class="label">Cliente</label><input id="np_cliente" class="mini-input" placeholder="Cliente"></div>
    <div><label class="label">Estado</label><select id="np_estado" class="mini-input"></select></div>
    <div><label class="label">Entrega</label><input id="np_entrega" class="mini-input" type="date"></div>
    <div><label class="label">Lugar</label><input id="np_lugar" class="mini-input" placeholder="Lugar / instalación"></div>
    <div class="wide"><label class="label">Información adicional</label><textarea id="np_info" class="mini-input" placeholder="Notas generales del proyecto"></textarea></div>
    <div class="wide"><button class="btn full" onclick="createProject()">Guardar proyecto</button></div>
  </div>
</aside>

<button class="fab" onclick="openDrawer()">+</button>
<div class="toast" id="toast">Guardado</div>

<script>
const STORAGE_KEY='tuttoproyecto_v5_subdesplegable';
const STATUS=['Solicitud','Pendiente','En curso','En revisión','Listo','Entregado','Bloqueado'];
const RESPONSABLES=['Todos','Carlos','Chico','Rubén','Gabriela','Roberto','Ricardo','Por asignar'];
const MATERIALES=['PVC','PVC laminado','Acrílico','PVC + Acrílico','Frontlit','Otro'];
const FIJACIONES=['Ninguna','Chupones','Cinta doble faz fina','Cinta doble faz verde','Otra'];
const PLANTILLAS=['No','Sí - Cartón','Sí - Papel','Otra'];
const LUZ_TIPOS=['No','Sí - Módulos','Sí - Cinta LED'];
const LUZ_TEMP=['No aplica','Cálida','Media','Fría'];

let openProjects=new Set(['p1']);
let openItems=new Set(['i1']);

const seed=[
  {
    id:'p1',
    nombre:'Groovy',
    cliente:'google',
    estado:'En curso',
    entrega:'2026-05-20',
    lugar:'la viña',
    info:'Pendiente revisar medidas finales.',
    items:[
      {
        id:'i1',
        nombre:'Logo principal',
        dimensiones:'120 x 60 cm',
        material:'PVC + Acrílico',
        materialOtro:'',
        iluminacion:'Sí - Módulos',
        temperatura:'Fría',
        fijacion:'Chupones',
        fijacionOtro:'',
        plantilla:'Sí - Cartón',
        plantillaOtro:'',
        instalacion:'Pared frontal',
        info:'Color según arte.',
        procesos:[]
      },
      {
        id:'i2',
        nombre:'Texto secundario',
        dimensiones:'80 x 20 cm',
        material:'PVC laminado',
        materialOtro:'',
        iluminacion:'No',
        temperatura:'No aplica',
        fijacion:'Cinta doble faz verde',
        fijacionOtro:'',
        plantilla:'No',
        plantillaOtro:'',
        instalacion:'',
        info:'',
        procesos:[]
      }
    ]
  }
];

let data=load();

function load(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw)return JSON.parse(raw);
  }catch(e){}
  const d=structuredClone(seed);
  d.forEach(p=>p.items.forEach(i=>i.procesos=generateProcesses(i)));
  return d;
}

function save(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
  showToast('Guardado');
}

function uid(prefix){return prefix+Math.random().toString(36).slice(2,9)}
function esc(v){return String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}

function proc(nombre,responsable){return {id:uid('pr'),nombre,responsable,done:false}}

function generateProcesses(item){
  const list=[];

  if(item.material==='PVC') list.push(proc('Cortar PVC','Carlos'));

  if(item.material==='PVC laminado'){
    list.push(proc('Mandar a imprimir','Roberto'));
    list.push(proc('Imprimir','Rubén'));
    list.push(proc('Laminar','Rubén'));
    list.push(proc('Cortar PVC','Carlos'));
  }

  if(item.material==='Acrílico') list.push(proc('Cortar acrílico','Carlos'));

  if(item.material==='PVC + Acrílico'){
    list.push(proc('Cortar PVC','Carlos'));
    list.push(proc('Cortar acrílico','Carlos'));
    list.push(proc('Pegar PVC al acrílico','Chico'));
  }

  if(item.material==='Frontlit'){
    list.push(proc('Cortar PVC','Carlos'));
    list.push(proc('Cortar acrílico','Carlos'));
    list.push(proc('Doblar banda','Chico'));
    list.push(proc('Pegar banda al acrílico','Chico'));
  }

  if(item.material==='Otro') list.push(proc('Definir procesos del material especial','Por asignar'));

  if(item.iluminacion==='Sí - Módulos'){
    list.push(proc('Pegar módulos LED','Chico'));
    list.push(proc('Cablear iluminación','Chico'));
    list.push(proc('Probar iluminación','Todos'));
  }

  if(item.iluminacion==='Sí - Cinta LED'){
    list.push(proc('Pegar cinta LED','Chico'));
    list.push(proc('Cablear iluminación','Chico'));
    list.push(proc('Probar iluminación','Todos'));
  }

  if(item.plantilla==='Sí - Cartón') list.push(proc('Cortar plantilla en cartón','Carlos'));
  if(item.plantilla==='Sí - Papel') list.push(proc('Mandar a imprimir plantilla','Rubén'));
  if(item.plantilla==='Otra') list.push(proc('Definir proceso de plantilla','Por asignar'));

  if(item.fijacion==='Chupones'){
    list.push(proc('Pegar chupones','Carlos'));
    list.push(proc('Ubicar ramplug','Carlos'));
    list.push(proc('Preparar tornillos','Carlos'));
  }

  if(item.fijacion==='Cinta doble faz fina') list.push(proc('Colocar doble faz fina','Chico'));
  if(item.fijacion==='Cinta doble faz verde') list.push(proc('Colocar doble faz verde','Chico'));
  if(item.fijacion==='Otra') list.push(proc('Definir proceso de fijación','Por asignar'));

  list.push(proc('Revisar calidad final','Todos'));
  list.push(proc('Tomar foto','Todos'));
  list.push(proc('Embalar','Todos'));

  return list;
}

function statusClass(s){
  return {
    'Solicitud':'st-solicitud','Pendiente':'st-pendiente','En curso':'st-curso',
    'En revisión':'st-revision','Listo':'st-listo','Entregado':'st-entregado','Bloqueado':'st-bloqueado'
  }[s]||'st-pendiente';
}

function progress(p){
  const procesos=p.items.flatMap(i=>i.procesos||[]);
  if(!procesos.length)return ['Listo','Entregado'].includes(p.estado)?100:0;
  return Math.round((procesos.filter(x=>x.done).length/procesos.length)*100);
}

function itemProgress(i){
  const procesos=i.procesos||[];
  if(!procesos.length)return 0;
  return Math.round((procesos.filter(x=>x.done).length/procesos.length)*100);
}

function isLate(p){
  if(!p.entrega||['Listo','Entregado'].includes(p.estado))return false;
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(p.entrega+'T00:00:00');
  return d<today;
}

function daysLeft(p){
  if(!p.entrega)return 'Sin fecha';
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(p.entrega+'T00:00:00');
  const diff=Math.ceil((d-today)/86400000);
  if(diff<0)return Math.abs(diff)+' días tarde';
  if(diff===0)return 'Hoy';
  if(diff===1)return 'Mañana';
  return diff+' días';
}

function render(){
  renderFilters();
  renderKpis();
  renderProjects();
}

function renderFilters(){
  const fs=document.getElementById('filterStatus');
  const fr=document.getElementById('filterResp');
  const ns=document.getElementById('np_estado');
  if(fs.options.length===1)STATUS.forEach(s=>fs.add(new Option(s,s)));
  if(ns.options.length===0)STATUS.forEach(s=>ns.add(new Option(s,s)));
  if(fr.options.length===1)RESPONSABLES.forEach(r=>fr.add(new Option(r,r)));
}

function getFiltered(){
  const q=document.getElementById('q')?.value.toLowerCase().trim()||'';
  const st=document.getElementById('filterStatus')?.value||'';
  const resp=document.getElementById('filterResp')?.value||'';
  const luz=document.getElementById('filterLight')?.value||'';
  const sort=document.getElementById('sortBy')?.value||'entrega';

  let arr=data.filter(p=>{
    const blob=[
      p.nombre,p.cliente,p.estado,p.lugar,p.info,
      ...p.items.map(i=>[
        i.nombre,i.dimensiones,i.material,i.materialOtro,i.iluminacion,i.fijacion,i.fijacionOtro,i.plantilla,i.plantillaOtro,i.instalacion,i.info,
        ...(i.procesos||[]).map(pr=>pr.nombre+' '+pr.responsable)
      ].join(' '))
    ].join(' ').toLowerCase();

    const hasResp=!resp || p.items.some(i=>(i.procesos||[]).some(pr=>pr.responsable===resp));
    const hasLuz=!luz || p.items.some(i=>i.iluminacion.startsWith(luz));
    return (!q||blob.includes(q))&&(!st||p.estado===st)&&hasResp&&hasLuz;
  });

  arr.sort((a,b)=>{
    if(sort==='progreso')return progress(a)-progress(b);
    if(sort==='nombre')return a.nombre.localeCompare(b.nombre);
    if(sort==='estado')return a.estado.localeCompare(b.estado);
    return (a.entrega||'9999').localeCompare(b.entrega||'9999');
  });

  return arr;
}

function renderKpis(){
  const k=document.getElementById('kpis');
  const total=data.length;
  const curso=data.filter(p=>p.estado==='En curso').length;
  const pendiente=data.filter(p=>['Solicitud','Pendiente'].includes(p.estado)).length;
  const listo=data.filter(p=>['Listo','Entregado'].includes(p.estado)).length;
  const bloqueado=data.filter(p=>p.estado==='Bloqueado').length;
  const tarde=data.filter(isLate).length;

  k.innerHTML=`
    <div class="kpi"><small>Total proyectos</small><strong>${total}</strong></div>
    <div class="kpi black"><small>En curso</small><strong>${curso}</strong></div>
    <div class="kpi yellow"><small>Pendientes</small><strong>${pendiente}</strong></div>
    <div class="kpi green"><small>Listos</small><strong>${listo}</strong></div>
    <div class="kpi orange"><small>Bloqueados</small><strong>${bloqueado}</strong></div>
    <div class="kpi red"><small>Atrasados</small><strong>${tarde}</strong></div>`;
}

function renderProjects(){
  const box=document.getElementById('projects');
  const arr=getFiltered();

  if(!arr.length){
    box.innerHTML='<div class="empty">No hay proyectos con ese filtro.</div>';
    return;
  }

  box.innerHTML=arr.map((p,idx)=>projectHTML(p,idx)).join('');
}

function projectHTML(p,idx){
  const pr=progress(p);
  const open=openProjects.has(p.id)?'open':'';

  return `
  <article class="project ${open}">
    <div class="project-summary" onclick="toggleProject('${p.id}')">
      <div class="num">${String(idx+1).padStart(2,'0')}</div>

      <div class="project-name">
        <h2>${esc(p.nombre)}</h2>
        <div class="mini">
          <span class="chip">👤 ${esc(p.cliente)}</span>
          <span class="chip">📍 ${esc(p.lugar||'Sin lugar')}</span>
          <span class="chip">📦 ${p.items.length} ítem(s)</span>
          <span class="chip">📅 ${p.entrega?formatDate(p.entrega):'S/F'}</span>
          <span class="chip">⚙️ ${pr}%</span>
          ${isLate(p)?'<span class="chip" style="color:var(--red);border-color:#fecaca;background:#fff1f2">⚠ Atrasado</span>':''}
        </div>
      </div>

      <span class="badge ${statusClass(p.estado)}">${esc(p.estado)}</span>
      <button class="toggle" type="button">⌄</button>
    </div>

    <div class="detail">
      ${projectInfoHTML(p)}
      ${itemsHTML(p)}
    </div>
  </article>`;
}

function projectInfoHTML(p){
  return `
  <div class="project-info">
    <div class="info-grid">
      <div><label class="label">Nombre</label><input class="mini-input" value="${esc(p.nombre)}" onchange="updateProject('${p.id}','nombre',this.value)"></div>
      <div><label class="label">Cliente</label><input class="mini-input" value="${esc(p.cliente)}" onchange="updateProject('${p.id}','cliente',this.value)"></div>
      <div><label class="label">Estado</label><select class="mini-input" onchange="updateProject('${p.id}','estado',this.value)">${STATUS.map(s=>`<option ${p.estado===s?'selected':''}>${s}</option>`).join('')}</select></div>
      <div><label class="label">Entrega</label><input type="date" class="mini-input" value="${esc(p.entrega)}" onchange="updateProject('${p.id}','entrega',this.value)"></div>
      <div><label class="label">Lugar</label><input class="mini-input" value="${esc(p.lugar)}" onchange="updateProject('${p.id}','lugar',this.value)"></div>
      <div class="wide"><label class="label">Información adicional</label><textarea class="mini-input" onchange="updateProject('${p.id}','info',this.value)">${esc(p.info)}</textarea></div>
    </div>
  </div>`;
}

function itemsHTML(p){
  let html='<div class="items-wrap">';

  html+=p.items.map((i,index)=>itemHTML(p.id,i,index)).join('');

  html+=`
    <div class="add-item-row">
      <input id="newItem-${p.id}" class="mini-input" placeholder="+ Nuevo ítem">
      <button class="small-btn blue" onclick="addItem('${p.id}')">Añadir ítem</button>
    </div>`;

  html+='</div>';
  return html;
}

function itemHTML(pid,i,index){
  const open=openItems.has(i.id)?'open':'';
  const materialLabel=i.material==='Otro'?(i.materialOtro||'Otro'):i.material;
  const fijacionLabel=i.fijacion==='Otra'?(i.fijacionOtro||'Otra'):i.fijacion;

  return `
  <div class="item-card ${open}">
    <div class="item-summary" onclick="toggleItem('${i.id}')">
      <div>
        <div class="item-title">Ítem ${index+1}: ${esc(i.nombre)}</div>
        <div class="item-sub">
          <span>${esc(materialLabel)}</span>
          <span>${esc(i.iluminacion)}</span>
          <span>${esc(fijacionLabel)}</span>
          <span>${esc(i.dimensiones||'Sin medida')}</span>
        </div>
      </div>
      <div class="item-progress">${itemProgress(i)}%</div>
      <button class="toggle" type="button">⌄</button>
    </div>

    <div class="item-detail">
      <div class="item-grid">
        <div><label class="label">Nombre</label><input class="mini-input" value="${esc(i.nombre)}" onchange="updateItem('${pid}','${i.id}','nombre',this.value)"></div>
        <div><label class="label">Dimensiones</label><input class="mini-input" value="${esc(i.dimensiones)}" onchange="updateItem('${pid}','${i.id}','dimensiones',this.value)"></div>

        <div>
          <label class="label">Materiales</label>
          <select class="mini-input" onchange="updateItemAndProcesses('${pid}','${i.id}','material',this.value)">
            ${MATERIALES.map(m=>`<option ${i.material===m?'selected':''}>${m}</option>`).join('')}
          </select>
        </div>

        <div class="${i.material==='Otro'?'':'hidden'}">
          <label class="label">Especificar material</label>
          <input class="mini-input" value="${esc(i.materialOtro||'')}" onchange="updateItem('${pid}','${i.id}','materialOtro',this.value)">
        </div>

        <div>
          <label class="label">Iluminación</label>
          <select class="mini-input" onchange="updateItemAndProcesses('${pid}','${i.id}','iluminacion',this.value)">
            ${LUZ_TIPOS.map(x=>`<option ${i.iluminacion===x?'selected':''}>${x}</option>`).join('')}
          </select>
        </div>

        <div>
          <label class="label">Temperatura</label>
          <select class="mini-input" onchange="updateItem('${pid}','${i.id}','temperatura',this.value)">
            ${LUZ_TEMP.map(x=>`<option ${i.temperatura===x?'selected':''}>${x}</option>`).join('')}
          </select>
        </div>

        <div>
          <label class="label">Fijación</label>
          <select class="mini-input" onchange="updateItemAndProcesses('${pid}','${i.id}','fijacion',this.value)">
            ${FIJACIONES.map(x=>`<option ${i.fijacion===x?'selected':''}>${x}</option>`).join('')}
          </select>
        </div>

        <div class="${i.fijacion==='Otra'?'':'hidden'}">
          <label class="label">Especificar fijación</label>
          <input class="mini-input" value="${esc(i.fijacionOtro||'')}" onchange="updateItem('${pid}','${i.id}','fijacionOtro',this.value)">
        </div>

        <div>
          <label class="label">Plantilla</label>
          <select class="mini-input" onchange="updateItemAndProcesses('${pid}','${i.id}','plantilla',this.value)">
            ${PLANTILLAS.map(x=>`<option ${i.plantilla===x?'selected':''}>${x}</option>`).join('')}
          </select>
        </div>

        <div class="${i.plantilla==='Otra'?'':'hidden'}">
          <label class="label">Especificar plantilla</label>
          <input class="mini-input" value="${esc(i.plantillaOtro||'')}" onchange="updateItem('${pid}','${i.id}','plantillaOtro',this.value)">
        </div>

        <div><label class="label">Instalación</label><input class="mini-input" value="${esc(i.instalacion)}" onchange="updateItem('${pid}','${i.id}','instalacion',this.value)"></div>
        <div class="wide"><label class="label">Información adicional</label><textarea class="mini-input" onchange="updateItem('${pid}','${i.id}','info',this.value)">${esc(i.info)}</textarea></div>
      </div>

      <div class="process-title">Procesos</div>
      <div class="process-list">
        ${(i.procesos||[]).map(pr=>processHTML(pid,i.id,pr)).join('')}
      </div>

      <div class="add-row">
        <input id="newProcess-${i.id}" class="mini-input" placeholder="+ Añadir proceso">
        <select id="newProcessResp-${i.id}" class="mini-input">
          ${RESPONSABLES.map(r=>`<option>${r}</option>`).join('')}
        </select>
        <button class="small-btn blue" onclick="addProcess('${pid}','${i.id}')">Añadir</button>
      </div>

      <div style="margin-top:8px">
        <button class="small-btn red" onclick="deleteItem('${pid}','${i.id}')">Eliminar ítem</button>
      </div>
    </div>
  </div>`;
}

function processHTML(pid,iid,pr){
  return `
  <div class="process ${pr.done?'done':''}">
    <input type="checkbox" ${pr.done?'checked':''} onchange="toggleProcess('${pid}','${iid}','${pr.id}',this.checked)">
    <div class="process-name">${esc(pr.nombre)}</div>
    <select class="mini-input" onchange="updateProcess('${pid}','${iid}','${pr.id}','responsable',this.value)">
      ${RESPONSABLES.map(r=>`<option ${pr.responsable===r?'selected':''}>${r}</option>`).join('')}
    </select>
    <button class="xbtn" onclick="deleteProcess('${pid}','${iid}','${pr.id}')">×</button>
  </div>`;
}

function toggleProject(id){
  openProjects.has(id)?openProjects.delete(id):openProjects.add(id);
  renderProjects();
}

function toggleItem(id){
  openItems.has(id)?openItems.delete(id):openItems.add(id);
  renderProjects();
}

function findP(id){return data.find(p=>p.id===id)}
function findItem(pid,iid){return findP(pid).items.find(i=>i.id===iid)}
function findProcess(pid,iid,prid){return findItem(pid,iid).procesos.find(pr=>pr.id===prid)}

function updateProject(id,key,val){
  findP(id)[key]=val;
  save();
  render();
}

function updateItem(pid,iid,key,val){
  findItem(pid,iid)[key]=val;
  save();
  render();
}

function updateItemAndProcesses(pid,iid,key,val){
  const i=findItem(pid,iid);
  i[key]=val;
  i.procesos=generateProcesses(i);
  save();
  render();
}

function updateProcess(pid,iid,prid,key,val){
  findProcess(pid,iid,prid)[key]=val;
  save();
  render();
}

function toggleProcess(pid,iid,prid,done){
  findProcess(pid,iid,prid).done=done;
  save();
  render();
}

function addProcess(pid,iid){
  const input=document.getElementById('newProcess-'+iid);
  const resp=document.getElementById('newProcessResp-'+iid);
  if(!input.value.trim())return;

  findItem(pid,iid).procesos.push({
    id:uid('pr'),
    nombre:input.value.trim(),
    responsable:resp.value,
    done:false
  });

  save();
  render();
}

function deleteProcess(pid,iid,prid){
  const i=findItem(pid,iid);
  i.procesos=i.procesos.filter(pr=>pr.id!==prid);
  save();
  render();
}

function addItem(pid){
  const input=document.getElementById('newItem-'+pid);
  if(!input.value.trim())return;

  const item={
    id:uid('i'),
    nombre:input.value.trim(),
    dimensiones:'',
    material:'PVC',
    materialOtro:'',
    iluminacion:'No',
    temperatura:'No aplica',
    fijacion:'Ninguna',
    fijacionOtro:'',
    plantilla:'No',
    plantillaOtro:'',
    instalacion:'',
    info:'',
    procesos:[]
  };

  item.procesos=generateProcesses(item);
  findP(pid).items.push(item);
  openItems.add(item.id);

  save();
  render();
}

function deleteItem(pid,iid){
  if(!confirm('¿Eliminar este ítem?'))return;
  const p=findP(pid);
  p.items=p.items.filter(i=>i.id!==iid);
  openItems.delete(iid);
  save();
  render();
}

function deleteProject(id){
  if(!confirm('¿Eliminar este proyecto completo?'))return;
  data=data.filter(p=>p.id!==id);
  openProjects.delete(id);
  save();
  render();
}

function openDrawer(){
  document.getElementById('backdrop').classList.add('show');
  document.getElementById('drawer').classList.add('show');
  setTimeout(()=>document.getElementById('np_nombre').focus(),80);
}

function closeDrawer(){
  document.getElementById('backdrop').classList.remove('show');
  document.getElementById('drawer').classList.remove('show');
}

function createProject(){
  const nombre=document.getElementById('np_nombre').value.trim();
  if(!nombre){
    showToast('Falta nombre del proyecto');
    return;
  }

  const p={
    id:uid('p'),
    nombre,
    cliente:document.getElementById('np_cliente').value.trim()||nombre,
    estado:document.getElementById('np_estado').value||'Solicitud',
    entrega:document.getElementById('np_entrega').value,
    lugar:document.getElementById('np_lugar').value.trim(),
    info:document.getElementById('np_info').value.trim(),
    items:[]
  };

  data.unshift(p);
  openProjects.add(p.id);

  ['np_nombre','np_cliente','np_entrega','np_lugar','np_info'].forEach(id=>document.getElementById(id).value='');

  save();
  closeDrawer();
  render();
}

function formatDate(d){
  const [y,m,day]=d.split('-');
  return `${day}/${m}`;
}

let toastTimer;
function showToast(txt){
  const t=document.getElementById('toast');
  t.textContent=txt;
  clearTimeout(toastTimer);
  t.classList.add('show');
  toastTimer=setTimeout(()=>t.classList.remove('show'),1200);
}

document.getElementById("mobileMenuBtn")?.addEventListener("click",()=>{
  document.getElementById("authMenu")?.classList.toggle("open");
});

render();
</script>
